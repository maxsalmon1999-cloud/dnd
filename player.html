<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Player Screen</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Geneva', 'Chicago', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            background: #0c0a08;
            color: #d4c4a0;
            min-height: 100vh;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
        }

        /* ===================== SELECT SCREEN ===================== */
        .select-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
            gap: 16px;
        }

        .select-title {
            font-size: 13px;
            font-weight: bold;
            color: #c4a44e;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            border-bottom: 1px solid #3a3530;
            padding-bottom: 12px;
            width: 100%;
            max-width: 320px;
        }

        .select-subtitle {
            font-size: 10px;
            color: #5a5040;
            text-align: center;
            margin-top: -8px;
        }

        .select-cards {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 320px;
        }

        .select-card {
            background: #1e1c18;
            border: 1.5px solid #3a3530;
            padding: 12px 14px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: #d4c4a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .select-card:hover, .select-card:active {
            background: #c4a44e;
            color: #0c0a08;
            border-color: #c4a44e;
        }

        .select-card:hover .select-class,
        .select-card:active .select-class,
        .select-card:hover .select-arrow,
        .select-card:active .select-arrow {
            color: #0c0a08;
        }

        .select-name { font-weight: bold; font-size: 13px; }
        .select-class { font-size: 10px; color: #8a7e68; margin-top: 2px; }
        .select-arrow { font-size: 11px; color: #5a5040; }

        /* ===================== PLAYER SCREEN ===================== */
        .player-screen {
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            padding: 6px;
            gap: 5px;
        }

        /* Window chrome */
        .win {
            background: #1a1815;
            border: 2px solid #3a3530;
            box-shadow: 2px 2px 0 #000;
        }

        .win-title {
            background: #2a2620;
            border-bottom: 2px solid #3a3530;
            padding: 2px 6px;
            display: flex;
            align-items: center;
            height: 22px;
        }

        .close-box {
            width: 14px;
            height: 14px;
            border: 1.5px solid #5a5040;
            background: #2a2620;
            flex-shrink: 0;
            cursor: pointer;
        }

        .close-box:active { background: #c4a44e; }

        .win-stripes {
            flex: 1;
            height: 12px;
            background: repeating-linear-gradient(
                transparent 0px, transparent 1px,
                #3a3530 1px, #3a3530 2px,
                transparent 2px, transparent 3px
            );
            margin: 0 6px;
        }

        .win-label {
            font-size: 11px;
            font-weight: bold;
            color: #c4a44e;
            flex-shrink: 0;
        }

        .win-body {
            padding: 8px;
            background: #161412;
        }

        /* Section label */
        .section-label {
            font-size: 9px;
            font-weight: bold;
            color: #5a5040;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
        }

        /* ===================== HP ===================== */
        .hp-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .hp-btn {
            width: 48px;
            height: 48px;
            background: #2a2620;
            border: 1.5px solid #4a4540;
            color: #c4a44e;
            font-family: inherit;
            font-size: 26px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            user-select: none;
        }

        .hp-btn:active { background: #c4a44e; color: #0c0a08; }

        .hp-display {
            flex: 1;
            text-align: center;
        }

        .hp-current {
            font-size: 40px;
            font-weight: bold;
            color: #c4a44e;
            line-height: 1;
            transition: color 0.3s;
        }

        .hp-current.low  { color: #e04040; }
        .hp-current.mid  { color: #e07040; }

        .hp-max-label {
            font-size: 10px;
            color: #8a7e68;
            margin-top: 2px;
        }

        .char-class-label {
            font-size: 10px;
            color: #8a7e68;
            text-align: center;
            margin-bottom: 6px;
        }

        .hp-bar-wrap {
            height: 5px;
            background: #2a2620;
            border: 1px solid #3a3530;
            margin-bottom: 8px;
        }

        .hp-bar {
            height: 100%;
            background: #c4a44e;
            transition: width 0.3s, background 0.3s;
        }

        .hp-bar.low  { background: #e04040; }
        .hp-bar.mid  { background: #e07040; }

        /* ===================== STATS ===================== */
        .core-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 6px;
        }

        .stat-box {
            background: #2a2620;
            border: 1px solid #3a3530;
            padding: 5px 4px;
            text-align: center;
        }

        .stat-box-label {
            font-size: 9px;
            color: #8a7e68;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .stat-box-value {
            font-size: 16px;
            font-weight: bold;
            color: #e0d6c0;
            margin-top: 1px;
        }

        .ability-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }

        .ability-box {
            background: #1e1c18;
            border: 1px solid #2a2620;
            padding: 4px 2px;
            text-align: center;
        }

        .ability-label {
            font-size: 9px;
            color: #8a7e68;
            text-transform: uppercase;
        }

        .ability-mod {
            font-size: 15px;
            font-weight: bold;
            color: #d4c4a0;
            margin-top: 1px;
        }

        /* ===================== SPELL SLOTS ===================== */
        .slot-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        .slot-level-label {
            font-size: 10px;
            color: #8a7e68;
            min-width: 50px;
        }

        .slot-pip {
            width: 16px;
            height: 16px;
            border: 1.5px solid #4a4540;
            background: #c4a44e;
            cursor: pointer;
        }

        .slot-pip.spent { background: #1a1815; }
        .slot-pip:active { border-color: #e0d6c0; }

        /* ===================== ABILITIES ===================== */
        .ability-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .ability-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #2a2620;
            border: 1px solid #4a4540;
            padding: 5px 9px;
            font-family: inherit;
            font-size: 10px;
            color: #e0d6c0;
            cursor: pointer;
        }

        .ability-chip.used {
            background: #1a1815;
            color: #5a5040;
            text-decoration: line-through;
            cursor: default;
        }

        .ability-chip.passive {
            opacity: 0.65;
            cursor: default;
        }

        .ability-chip:not(.used):not(.passive):active {
            background: #c4a44e;
            color: #0c0a08;
        }

        .chip-count {
            font-size: 9px;
            opacity: 0.7;
        }

        /* ===================== INVENTORY ===================== */
        .inv-list {
            min-height: 20px;
            margin-bottom: 6px;
        }

        .inv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 4px;
            border-bottom: 1px dotted #2a2620;
            font-size: 11px;
        }

        .inv-empty {
            font-size: 10px;
            color: #5a5040;
            font-style: italic;
            padding: 6px 0;
            text-align: center;
        }

        .inv-remove {
            background: none;
            border: none;
            color: #5a5040;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            font-family: inherit;
            line-height: 1;
            flex-shrink: 0;
        }

        .inv-remove:active { color: #e04040; }

        .inv-add {
            display: flex;
            gap: 4px;
        }

        .inv-input {
            flex: 1;
            background: #0c0a08;
            border: 1.5px solid #3a3530;
            color: #d4c4a0;
            padding: 6px 7px;
            font-family: inherit;
            font-size: 11px;
            outline: none;
        }

        .inv-input:focus { border-color: #c4a44e; }
        .inv-input::placeholder { color: #5a5040; }

        .inv-add-btn {
            background: #2a2620;
            border: 1.5px solid #4a4540;
            color: #c4a44e;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .inv-add-btn:active { background: #c4a44e; color: #0c0a08; }

        /* ===================== DICE ===================== */

        /* Die pool — where queued dice sit before rolling */
        .dice-pool {
            min-height: 330px;
            background: #0c0a08;
            border: 1.5px solid #2a2620;
            border-radius: 3px;
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }

        .dice-pool-empty {
            color: #3a3530;
            font-size: 11px;
            font-style: italic;
            user-select: none;
            pointer-events: none;
        }

        /* Individual die in the pool */
        .pool-die {
            width: 186px;
            height: 186px;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }

        .pool-die svg { width: 100%; height: 100%; display: block; }

        .die-face-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: #c4a44e;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 6px #000;
            line-height: 1;
            white-space: nowrap;
        }

        .pool-die.landed .die-face-label {
            font-size: 58px;
            color: #e0d6c0;
        }

        .pool-die.landed.crit .die-face-label { color: #4aff4a; }
        .pool-die.landed.fail .die-face-label { color: #e04040; }

        .pool-die.landed.crit svg polygon,
        .pool-die.landed.crit svg rect,
        .pool-die.landed.crit svg circle { stroke: #4aff4a; filter: drop-shadow(0 0 4px #4aff4a88); }

        .pool-die.landed.fail svg polygon,
        .pool-die.landed.fail svg rect,
        .pool-die.landed.fail svg circle { stroke: #e04040; filter: drop-shadow(0 0 4px #e0404088); }

        .die-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 28px;
            height: 28px;
            background: #2a2620;
            border: 1px solid #5a5040;
            color: #8a7e68;
            font-size: 18px;
            line-height: 26px;
            text-align: center;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
        }

        .die-remove:active { background: #5a3030; color: #e04040; }

        /* Tumble animation */
        @keyframes die-tumble {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); }
            18%  { transform: translate(var(--dx), var(--dy)) rotate(var(--r1)) scale(1.35); opacity: 0.85; }
            55%  { transform: translate(calc(var(--dx)*0.1), calc(var(--dy)*0.1)) rotate(var(--r2)) scale(0.93); opacity: 1; }
            72%  { transform: translate(calc(var(--dx)*-0.04), calc(var(--dy)*-0.04)) rotate(var(--r3)) scale(1.04); }
            87%  { transform: translate(1px,-1px) rotate(var(--r4)) scale(0.99); }
            100% { transform: translate(0,0) rotate(0deg) scale(1); }
        }

        .pool-die.rolling {
            animation: die-tumble var(--dur,1.1s) cubic-bezier(0.22,1,0.36,1) both;
        }

        /* Result bar */
        .dice-result-bar {
            background: #161412;
            border: 1.5px solid #2a2620;
            padding: 7px 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dice-result-total {
            font-size: 30px;
            font-weight: bold;
            color: #c4a44e;
            line-height: 1;
            flex-shrink: 0;
        }

        .dice-result-total.crit { color: #4aff4a; }
        .dice-result-total.fail { color: #e04040; }

        .dice-result-breakdown {
            font-size: 9px;
            color: #5a5040;
            line-height: 1.7;
        }

        /* Roll / Clear buttons */
        .dice-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .roll-all-btn {
            flex: 1;
            background: #c4a44e;
            border: none;
            color: #0c0a08;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            padding: 11px 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .roll-all-btn:disabled { background: #2a2620; color: #4a4540; cursor: default; }
        .roll-all-btn:not(:disabled):active { background: #dbb85a; }

        .clear-btn {
            background: #1e1c18;
            border: 1.5px solid #3a3530;
            color: #5a5040;
            font-family: inherit;
            font-size: 11px;
            padding: 11px 13px;
            cursor: pointer;
        }

        .clear-btn:active { background: #2a2620; }

        /* Die picker at the bottom */
        .die-picker {
            border-top: 1.5px solid #2a2620;
            padding-top: 8px;
        }

        .die-picker-label {
            font-size: 9px;
            color: #4a4540;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }

        .die-picker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .add-die-btn {
            background: #1e1c18;
            border: 1.5px solid #3a3530;
            color: #8a7e68;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            padding: 7px 0;
            cursor: pointer;
            flex: 1;
            min-width: 34px;
            text-align: center;
        }

        .add-die-btn:active { background: #2a2620; color: #c4a44e; border-color: #5a5040; }

        /* Roll history */
        .roll-history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            border-bottom: 1px dotted #2a2620;
            font-size: 10px;
            color: #5a5040;
        }

        .roll-history-val { font-weight: bold; color: #c4a44e; }
        .roll-history-val.crit { color: #4aff4a; }
        .roll-history-val.fail { color: #e04040; }

        /* ===================== TABS ===================== */
        .tab-bar {
            display: flex;
            border-bottom: 2px solid #3a3530;
            background: #201e1a;
        }

        .tab {
            flex: 1;
            padding: 8px 4px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            background: #201e1a;
            border: none;
            border-right: 1px solid #3a3530;
            color: #8a7e68;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .tab:last-child { border-right: none; }
        .tab:active { background: #2a2620; }

        .tab.active {
            background: #161412;
            color: #c4a44e;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>

<!-- CHARACTER SELECT SCREEN -->
<div id="selectScreen" class="select-screen" style="display:none">
    <div class="select-title">D&D — Choose Your Character</div>
    <p class="select-subtitle">Tap your character to open your screen</p>
    <div class="select-cards" id="selectCards"></div>
</div>

<!-- PLAYER SCREEN -->
<div id="playerScreen" class="player-screen" style="display:none">

    <!-- Character header + HP + stats -->
    <div class="win">
        <div class="win-title">
            <div class="close-box" onclick="goBack()" title="Back to character select"></div>
            <div class="win-stripes"></div>
            <span class="win-label" id="charTitle">—</span>
            <div class="win-stripes"></div>
        </div>
        <div class="win-body">
            <div class="char-class-label" id="charClassLabel"></div>
            <div class="hp-row">
                <button class="hp-btn" onclick="changeHp(-1)" title="Take damage">−</button>
                <div class="hp-display">
                    <div class="hp-current" id="hpCurrent">—</div>
                    <div class="hp-max-label" id="hpMaxLabel"></div>
                </div>
                <button class="hp-btn" onclick="changeHp(+1)" title="Heal">+</button>
            </div>
            <div class="hp-bar-wrap">
                <div class="hp-bar" id="hpBar" style="width:100%"></div>
            </div>
        </div>
    </div>

    <!-- Tabbed content -->
    <div class="win">
        <div class="tab-bar">
            <button class="tab active" data-tab="sheet" onclick="setTab('sheet')">Character</button>
            <button class="tab" data-tab="inventory" onclick="setTab('inventory')">Inventory</button>
            <button class="tab" data-tab="dice" onclick="setTab('dice')">Dice</button>
        </div>

        <!-- CHARACTER TAB: stats + abilities -->
        <div class="tab-panel active" id="tab-sheet">
            <div class="win-body">
                <div class="core-stats" id="coreStats" style="margin-bottom:6px"></div>
                <div class="ability-grid" id="abilityScores" style="margin-bottom:8px"></div>
                <div id="specialBody"></div>
            </div>
        </div>

        <!-- INVENTORY TAB -->
        <div class="tab-panel" id="tab-inventory">
            <div class="win-body">
                <div class="inv-list" id="invList">
                    <div class="inv-empty">No items yet</div>
                </div>
                <div class="inv-add">
                    <input type="text" class="inv-input" id="invInput" placeholder="Add an item..." maxlength="60">
                    <button class="inv-add-btn" onclick="addItem()">Add</button>
                </div>
            </div>
        </div>

        <!-- DICE TAB -->
        <div class="tab-panel" id="tab-dice">
            <div class="win-body">
                <!-- Queued dice -->
                <div class="dice-pool" id="dicePool">
                    <div class="dice-pool-empty" id="dicePoolEmpty">Add dice from the menu below</div>
                </div>

                <!-- Roll / Clear -->
                <div class="dice-actions">
                    <button class="roll-all-btn" id="rollAllBtn" onclick="rollAll()" disabled>Roll</button>
                    <button class="clear-btn" onclick="clearDice()">Clear</button>
                </div>

                <!-- Result -->
                <div class="dice-result-bar" id="diceResultBar" style="display:none">
                    <div class="dice-result-total" id="diceResultTotal"></div>
                    <div class="dice-result-breakdown" id="diceResultBreakdown"></div>
                </div>

                <!-- History -->
                <div id="rollHistory"></div>

                <!-- Picker -->
                <div class="die-picker">
                    <div class="die-picker-label">Add a die</div>
                    <div class="die-picker-row" id="diePickerRow"></div>
                </div>
            </div>
        </div>
    </div>

</div>

            maxHp: 24, ac: 15, proficiency: 2,
            spellSaveDC: 13, spellAttack: '+5',
            stats: { STR: -1, DEX: 2, CON: 2, INT: 0, WIS: 0, CHA: 3 },
            spellSlots: [
                { label: '2nd (Short Rest)', count: 2, key: 'w' }
            ],
            abilities: [
                { name: 'Fey Presence', key: 'fey_presence', max: 1, rest: 'Short', passive: false }
            ]
        }
    };

    // =========================================================
    // APP STATE
    // =========================================================
    let charKey = null;
    let char = null;
    let currentHp = null;
    let rollHistory  = [];
    let dicePoolItems = []; // [{sides, el}]
    let isRolling    = false;
    // spellSlotState and abilityState are now managed by Firebase

    // =========================================================
    // INIT
    // =========================================================
    function init() {
        const params = new URLSearchParams(window.location.search);
        charKey = (params.get('char') || '').toLowerCase();
        char = CHARS[charKey];

        if (!char) {
            buildSelectScreen();
            document.getElementById('selectScreen').style.display = 'flex';
        } else {
            buildPlayerScreen();
            document.getElementById('playerScreen').style.display = 'flex';
        }
    }

    // =========================================================
    // SELECT SCREEN
    // =========================================================
    function buildSelectScreen() {
        document.title = 'D&D — Choose Character';
        const container = document.getElementById('selectCards');
        Object.entries(CHARS).forEach(([key, c]) => {
            const btn = document.createElement('button');
            btn.className = 'select-card';
            btn.innerHTML =
                '<div><div class="select-name">' + c.name + '</div>' +
                '<div class="select-class">' + c.cls + '</div></div>' +
                '<span class="select-arrow">&#9654;</span>';
            btn.onclick = () => { window.location.search = '?char=' + key; };
            container.appendChild(btn);
        });
    }

    function goBack() {
        window.location.search = '';
    }

    // =========================================================
    // PLAYER SCREEN — BUILD
    // =========================================================
    function buildPlayerScreen() {
        document.title = char.name + ' — D&D';
        document.getElementById('charTitle').textContent = char.name;
        document.getElementById('charClassLabel').textContent = char.cls;

        buildCoreStats();
        buildAbilityScores();
        buildSpecial();
        buildDicePicker();
        startFirebaseSync();
    }

    function buildCoreStats() {
        const container = document.getElementById('coreStats');
        const items = [
            { label: 'AC', value: char.ac },
            { label: 'Proficiency', value: '+' + char.proficiency },
            char.spellSaveDC
                ? { label: 'Spell Save DC', value: char.spellSaveDC }
                : { label: 'Initiative', value: fmtMod(char.stats.DEX) }
        ];
        items.forEach(item => {
            const box = document.createElement('div');
            box.className = 'stat-box';
            box.innerHTML =
                '<div class="stat-box-label">' + item.label + '</div>' +
                '<div class="stat-box-value">' + item.value + '</div>';
            container.appendChild(box);
        });
    }

    function buildAbilityScores() {
        const container = document.getElementById('abilityScores');
        Object.entries(char.stats).forEach(([stat, mod]) => {
            const box = document.createElement('div');
            box.className = 'ability-box';
            box.innerHTML =
                '<div class="ability-label">' + stat + '</div>' +
                '<div class="ability-mod">' + fmtMod(mod) + '</div>';
            container.appendChild(box);
        });
    }

    function buildSpecial() {
        const body = document.getElementById('specialBody');
        const hasSlots = char.spellSlots.length > 0;
        const activeAbils = char.abilities.filter(a => !a.passive);
        const passiveAbils = char.abilities.filter(a => a.passive);

        // Spell slots section
        if (hasSlots) {
            const slotLabel = document.createElement('div');
            slotLabel.className = 'section-label';
            slotLabel.textContent = 'Spell Slots';
            body.appendChild(slotLabel);

            char.spellSlots.forEach(slot => {
                const row = document.createElement('div');
                row.className = 'slot-row';
                const lbl = document.createElement('span');
                lbl.className = 'slot-level-label';
                lbl.textContent = slot.label;
                row.appendChild(lbl);
                for (let i = 0; i < slot.count; i++) {
                    const pip = document.createElement('div');
                    pip.className = 'slot-pip';
                    pip.dataset.slotKey = slot.key + '_' + i;
                    pip.onclick = () => {
                        const spent = !pip.classList.contains('spent');
                        pip.classList.toggle('spent', spent);
                        db.ref('characters/' + charKey + '/slots/' + pip.dataset.slotKey).set(spent);
                    };
                    row.appendChild(pip);
                }
                body.appendChild(row);
            });

            if (activeAbils.length > 0) {
                const divider = document.createElement('div');
                divider.style.cssText = 'border-top:1px solid #3a3530;margin:6px 0 6px';
                body.appendChild(divider);
            }
        }

        // Active abilities
        if (activeAbils.length > 0) {
            const abilLabel = document.createElement('div');
            abilLabel.className = 'section-label';
            abilLabel.textContent = 'Abilities';
            body.appendChild(abilLabel);

            const chips = document.createElement('div');
            chips.className = 'ability-chips';
            activeAbils.forEach(a => {
                const btn = document.createElement('button');
                btn.className = 'ability-chip';
                btn.dataset.abilityKey = a.key;
                btn.dataset.abilityMax = a.max;
                const countSpan = document.createElement('span');
                countSpan.className = 'chip-count';
                countSpan.textContent = a.max + '/' + a.max;
                btn.textContent = a.name + ' ';
                btn.appendChild(countSpan);
                btn.onclick = () => {
                    if (btn.classList.contains('used')) return;
                    const currentUsed = parseInt(btn.dataset.currentUsed || '0') + 1;
                    db.ref('characters/' + charKey + '/abilities/' + a.key).set(currentUsed);
                };
                chips.appendChild(btn);
            });
            body.appendChild(chips);

            if (passiveAbils.length > 0) {
                const divider = document.createElement('div');
                divider.style.cssText = 'border-top:1px solid #3a3530;margin:6px 0 6px';
                body.appendChild(divider);
            }
        }

        // Passive abilities
        if (passiveAbils.length > 0) {
            const passLabel = document.createElement('div');
            passLabel.className = 'section-label';
            passLabel.textContent = 'Passive Features';
            body.appendChild(passLabel);

            const chips = document.createElement('div');
            chips.className = 'ability-chips';
            passiveAbils.forEach(a => {
                const btn = document.createElement('button');
                btn.className = 'ability-chip passive';
                btn.textContent = a.name;
                btn.title = a.desc || '';
                btn.disabled = true;
                chips.appendChild(btn);
            });
            body.appendChild(chips);
        }
    }

    function setTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    }

    // =========================================================
    // DIE SHAPES  (SVG inner content per die type)
    // =========================================================
    function getDieShape(sides) {
        const s = '#5a5040', f = '#1e1c18', w = 'stroke-width="2.5" stroke-linejoin="round"';
        const shapes = {
            4:   `<polygon points="50,10 91,83 9,83" fill="${f}" stroke="${s}" ${w}/>`,
            6:   `<rect x="9" y="9" width="82" height="82" rx="11" fill="${f}" stroke="${s}" stroke-width="2.5"/>`,
            8:   `<polygon points="50,8 91,50 50,92 9,50" fill="${f}" stroke="${s}" ${w}/>`,
            10:  `<polygon points="50,7 89,40 76,88 24,88 11,40" fill="${f}" stroke="${s}" ${w}/>`,
            12:  `<polygon points="50,7 88,33 76,80 24,80 12,33" fill="${f}" stroke="${s}" ${w}/>`,
            20:  `<polygon points="50,7 92,80 8,80" fill="${f}" stroke="${s}" ${w}/>
                  <line x1="50" y1="7"  x2="30" y2="80" stroke="#383228" stroke-width="1.5"/>
                  <line x1="50" y1="7"  x2="70" y2="80" stroke="#383228" stroke-width="1.5"/>
                  <line x1="8"  y1="80" x2="92" y2="80" stroke="#383228" stroke-width="1.5"/>`,
            100: `<circle cx="50" cy="50" r="42" fill="${f}" stroke="${s}" stroke-width="2.5"/>
                  <text x="50" y="62" text-anchor="middle" font-size="22" fill="#3a3530" font-family="serif" font-weight="bold">%</text>`,
        };
        return shapes[sides] || shapes[6];
    }

    // =========================================================
    // DICE POOL
    // =========================================================
    function buildDicePicker() {
        const row = document.getElementById('diePickerRow');
        [4, 6, 8, 10, 12, 20, 100].forEach(sides => {
            const btn = document.createElement('button');
            btn.className = 'add-die-btn';
            btn.textContent = 'd' + sides;
            btn.onclick = () => addDie(sides);
            row.appendChild(btn);
        });
    }

    function addDie(sides) {
        if (isRolling) return;
        const empty = document.getElementById('dicePoolEmpty');
        if (empty) empty.remove();

        const el = document.createElement('div');
        el.className = 'pool-die';
        el.dataset.sides = sides;
        el.innerHTML =
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${getDieShape(sides)}</svg>` +
            `<div class="die-face-label">d${sides}</div>` +
            `<div class="die-remove" onclick="removeDie(this.parentElement)">×</div>`;

        document.getElementById('dicePool').appendChild(el);
        dicePoolItems.push({ sides, el });
        document.getElementById('rollAllBtn').disabled = false;
    }

    function removeDie(el) {
        if (isRolling) return;
        dicePoolItems = dicePoolItems.filter(d => d.el !== el);
        el.remove();
        if (dicePoolItems.length === 0) resetPool();
    }

    function clearDice() {
        if (isRolling) return;
        dicePoolItems = [];
        resetPool();
        document.getElementById('diceResultBar').style.display = 'none';
    }

    function resetPool() {
        const pool = document.getElementById('dicePool');
        pool.innerHTML = '<div class="dice-pool-empty" id="dicePoolEmpty">Add dice from the menu below</div>';
        document.getElementById('rollAllBtn').disabled = true;
    }

    // =========================================================
    // ROLLING
    // =========================================================
    function rollAll() {
        if (isRolling || dicePoolItems.length === 0) return;
        isRolling = true;

        // Pre-compute results and durations so timing is consistent
        const rolls = dicePoolItems.map((d, i) => ({
            sides:  d.sides,
            el:     d.el,
            result: Math.floor(Math.random() * d.sides) + 1,
            dur:    900 + Math.random() * 350 + i * 75,   // ms
            delay:  i * 35,                                // ms stagger
        }));

        document.getElementById('rollAllBtn').disabled = true;
        document.getElementById('diceResultBar').style.display = 'none';

        rolls.forEach(r => {
            const el       = r.el;
            const labelEl  = el.querySelector('.die-face-label');
            el.classList.remove('landed', 'crit', 'fail', 'rolling');

            // Random trajectory
            const dx = (Math.random() - 0.5) * 180;
            const dy = (Math.random() - 0.5) * 120;
            el.style.setProperty('--dx',  dx + 'px');
            el.style.setProperty('--dy',  dy + 'px');
            el.style.setProperty('--r1', (Math.random() * 600 - 300) + 'deg');
            el.style.setProperty('--r2', (Math.random() * 200 - 100) + 'deg');
            el.style.setProperty('--r3', (Math.random() *  60 -  30) + 'deg');
            el.style.setProperty('--r4', (Math.random() *  15 -   8) + 'deg');
            el.style.setProperty('--dur', (r.dur / 1000).toFixed(3) + 's');

            // Number scramble during flight
            const scramble = setInterval(() => {
                labelEl.textContent = Math.floor(Math.random() * r.sides) + 1;
            }, 55);

            setTimeout(() => {
                el.classList.add('rolling');
            }, r.delay);

            const landAt = r.delay + r.dur;
            setTimeout(() => {
                clearInterval(scramble);
                el.classList.remove('rolling');
                el.classList.add('landed');
                const isCrit = r.sides === 20 && r.result === 20;
                const isFail = r.sides === 20 && r.result === 1;
                if (isCrit) el.classList.add('crit');
                if (isFail) el.classList.add('fail');
                labelEl.textContent = r.result;
            }, landAt);
        });

        // Show results after all dice have landed
        const settleDur = Math.max(...rolls.map(r => r.delay + r.dur)) + 120;
        setTimeout(() => {
            showResults(rolls);
            isRolling = false;
            document.getElementById('rollAllBtn').disabled = false;
        }, settleDur);
    }

    function showResults(rolls) {
        const total = rolls.reduce((s, r) => s + r.result, 0);
        const isTotalCrit = rolls.length === 1 && rolls[0].sides === 20 && rolls[0].result === 20;
        const isTotalFail = rolls.length === 1 && rolls[0].sides === 20 && rolls[0].result === 1;

        const totalEl = document.getElementById('diceResultTotal');
        totalEl.textContent = total;
        totalEl.className = 'dice-result-total' + (isTotalCrit ? ' crit' : isTotalFail ? ' fail' : '');

        const breakdown = rolls.map(r => `d${r.sides}:${r.result}`).join('  ');
        document.getElementById('diceResultBreakdown').textContent =
            rolls.length > 1 ? breakdown + '  =  ' + total : (isTotalCrit ? 'Critical Hit!' : isTotalFail ? 'Critical Fail' : breakdown);

        document.getElementById('diceResultBar').style.display = 'flex';

        // History entry
        const historyLabel = rolls.map(r => `d${r.sides}`).join('+');
        const suffix = isTotalCrit ? ' CRIT!' : isTotalFail ? ' FAIL' : '';
        rollHistory.unshift({ label: historyLabel, total, isTotalCrit, isTotalFail, suffix });
        if (rollHistory.length > 6) rollHistory.pop();
        renderRollHistory();

        // Push to Firebase — one entry summarising the roll
        db.ref('diceLog').push({
            character: char.name,
            charKey,
            dice:      historyLabel,
            result:    total,
            timestamp: Date.now(),
        });
    }

    // =========================================================
    // FIREBASE SYNC
    // =========================================================
    function startFirebaseSync() {
        const charRef = db.ref('characters/' + charKey);

        // Initialise HP if this character has never connected before
        charRef.child('hp').once('value', snap => {
            if (snap.val() === null) {
                charRef.update({ hp: char.maxHp, maxHp: char.maxHp });
            }
        });

        // Live HP updates
        charRef.child('hp').on('value', snap => {
            const hp = snap.val();
            if (hp !== null) updateHpDisplay(hp);
        });

        // Live inventory updates
        charRef.child('inventory').on('value', snap => {
            renderInventory(snap.val() || {});
        });

        // Initialise spell slots in Firebase if not set
        if (char.spellSlots.length > 0) {
            charRef.child('slots').once('value', snap => {
                if (!snap.val()) {
                    const defaults = {};
                    char.spellSlots.forEach(s => {
                        for (let i = 0; i < s.count; i++) defaults[s.key + '_' + i] = false;
                    });
                    charRef.child('slots').set(defaults);
                }
            });
        }

        // Initialise abilities in Firebase if not set
        const activeAbils = char.abilities.filter(a => !a.passive && a.key);
        if (activeAbils.length > 0) {
            charRef.child('abilities').once('value', snap => {
                if (!snap.val()) {
                    const defaults = {};
                    activeAbils.forEach(a => { defaults[a.key] = 0; });
                    charRef.child('abilities').set(defaults);
                }
            });
        }

        // Live slot updates (DM or rest changes sync here)
        charRef.child('slots').on('value', snap => {
            const slots = snap.val() || {};
            Object.entries(slots).forEach(([key, spent]) => {
                const pip = document.querySelector('[data-slot-key="' + key + '"]');
                if (pip) pip.classList.toggle('spent', spent);
            });
        });

        // Live ability updates
        charRef.child('abilities').on('value', snap => {
            const abilities = snap.val() || {};
            Object.entries(abilities).forEach(([key, used]) => {
                const btn = document.querySelector('[data-ability-key="' + key + '"]');
                if (!btn) return;
                const max = parseInt(btn.dataset.abilityMax);
                btn.dataset.currentUsed = String(used);
                btn.querySelector('.chip-count').textContent = (max - used) + '/' + max;
                btn.classList.toggle('used', used >= max);
            });
        });
    }

    // =========================================================
    // HP
    // =========================================================
    function updateHpDisplay(hp) {
        currentHp = hp;
        const pct = Math.max(0, hp / char.maxHp);
        const hpEl   = document.getElementById('hpCurrent');
        const barEl  = document.getElementById('hpBar');
        const suffix = pct <= 0.25 ? ' low' : pct <= 0.5 ? ' mid' : '';

        hpEl.textContent = hp;
        hpEl.className = 'hp-current' + suffix;
        document.getElementById('hpMaxLabel').textContent = '/ ' + char.maxHp + ' HP';
        barEl.style.width = (pct * 100) + '%';
        barEl.className = 'hp-bar' + suffix;
    }

    function changeHp(delta) {
        if (currentHp === null) return;
        db.ref('characters/' + charKey + '/hp').transaction(hp => {
            const cur = hp !== null ? hp : char.maxHp;
            return Math.max(0, Math.min(char.maxHp, cur + delta));
        });
    }

    // =========================================================
    // INVENTORY
    // =========================================================
    function renderInventory(items) {
        const list = document.getElementById('invList');
        list.innerHTML = '';
        const keys = Object.keys(items);
        if (keys.length === 0) {
            list.innerHTML = '<div class="inv-empty">No items yet</div>';
            return;
        }
        keys.forEach(key => {
            const row = document.createElement('div');
            row.className = 'inv-item';
            const name = document.createElement('span');
            name.textContent = items[key];
            const removeBtn = document.createElement('button');
            removeBtn.className = 'inv-remove';
            removeBtn.textContent = '×';
            removeBtn.title = 'Remove item';
            removeBtn.onclick = () => {
                db.ref('characters/' + charKey + '/inventory/' + key).remove();
            };
            row.appendChild(name);
            row.appendChild(removeBtn);
            list.appendChild(row);
        });
    }

    function addItem() {
        const input = document.getElementById('invInput');
        const val = input.value.trim();
        if (!val) return;
        db.ref('characters/' + charKey + '/inventory').push(val);
        input.value = '';
        input.focus();
    }

    document.getElementById('invInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addItem();
    });

    // =========================================================
    // ROLL HISTORY
    // =========================================================
    function renderRollHistory() {
        const container = document.getElementById('rollHistory');
        container.innerHTML = '';
        rollHistory.forEach(entry => {
            const row = document.createElement('div');
            row.className = 'roll-history-row';
            const valCls = entry.isTotalCrit ? ' crit' : entry.isTotalFail ? ' fail' : '';
            row.innerHTML =
                '<span>' + entry.label + '</span>' +
                '<span class="roll-history-val' + valCls + '">' + entry.total + entry.suffix + '</span>';
            container.appendChild(row);
        });
    }

    // =========================================================
    // HELPERS
    // =========================================================
    function fmtMod(mod) {
        return mod >= 0 ? '+' + mod : String(mod);
    }

    // =========================================================
    // START
    // =========================================================
    init();
</script>
</body>
</html>
