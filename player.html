<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Player Screen</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.155.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.155.0/examples/jsm/"
      }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Geneva', 'Chicago', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            background: #000;
            background-image:
                radial-gradient(ellipse at center, #0a0804 0%, #000 60%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(20,15,10,0.03) 2px, rgba(20,15,10,0.03) 4px);
            color: #b8a880;
            min-height: 100vh;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
        }

        /* ===================== SELECT SCREEN ===================== */
        .select-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
            gap: 16px;
        }

        .select-title {
            font-size: 12px;
            font-weight: bold;
            color: #c4a44e;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-align: center;
            border-bottom: 1px solid #2a2218;
            padding-bottom: 12px;
            width: 100%;
            max-width: 320px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .select-subtitle {
            font-size: 10px;
            color: #4a4030;
            text-align: center;
            margin-top: -8px;
        }

        .select-cards {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 320px;
        }

        .select-card {
            background: #0a0a08;
            border: 2px solid #2a2218;
            box-shadow:
                inset 0 1px 0 #1a1610,
                inset 0 -1px 0 #060504,
                2px 2px 0 #000;
            padding: 10px 12px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: #b8a880;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .select-card:hover, .select-card:active {
            background: #1a1610;
            color: #c4a44e;
            border-color: #c4a44e;
        }

        .select-card:hover .select-class,
        .select-card:active .select-class {
            color: #b8a880;
        }

        .select-card:hover .select-arrow,
        .select-card:active .select-arrow {
            color: #c4a44e;
        }

        .select-name { font-weight: bold; font-size: 12px; }
        .select-class { font-size: 10px; color: #5a5040; margin-top: 2px; }
        .select-arrow { font-size: 11px; color: #3a3028; }

        /* ===================== PLAYER SCREEN ===================== */
        .player-screen {
            display: flex;
            flex-direction: column;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 6px;
            gap: 5px;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .player-screen > .win:last-child {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .player-screen > .win:last-child .tab-panel.active {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .player-screen > .win:last-child .tab-panel.active .win-body {
            flex: 1;
            overflow-y: auto;
        }

        /* Window chrome — thick beveled medieval iron */
        .win {
            background: #0a0a08;
            border: 3px solid #2a2218;
            box-shadow:
                inset 0 0 0 1px #1a1610,
                inset 0 0 0 2px #0d0b08,
                2px 2px 0 #000,
                0 0 8px rgba(0,0,0,0.8);
            position: relative;
        }

        .win::before {
            content: '\269C';
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #2a2218;
            z-index: 1;
            text-shadow: 0 1px 2px #000;
            line-height: 1;
        }

        .win-title {
            background: #12100c;
            border-bottom: 2px solid #2a2218;
            padding: 2px 6px;
            display: flex;
            align-items: center;
            height: 20px;
        }

        .close-box {
            width: 13px;
            height: 13px;
            border: 1.5px solid #3a3028;
            background: #0d0b08;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-box::after {
            content: '\2020';
            font-size: 9px;
            color: #4a4030;
            line-height: 1;
        }

        .close-box:active { background: #c4a44e; }
        .close-box:active::after { color: #000; }

        .win-stripes {
            flex: 1;
            height: 10px;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px, transparent 2px,
                #1a1610 2px, #1a1610 3px
            );
            margin: 0 5px;
        }

        .win-label {
            font-size: 10px;
            font-weight: bold;
            color: #c4a44e;
            flex-shrink: 0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .win-body {
            padding: 6px;
            background: #060504;
        }

        /* Section label — ornate divider lines */
        .section-label {
            font-size: 8px;
            font-weight: bold;
            color: #5a5040;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #2a2218, transparent);
        }

        /* Ornate section divider */
        .section-divider {
            text-align: center;
            border: none;
            margin: 5px 0;
            font-size: 10px;
            color: #2a2218;
            line-height: 1;
        }

        /* ===================== HP ===================== */
        .hp-row {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 3px;
        }

        .hp-btn {
            width: 40px;
            height: 40px;
            background: #0d0b08;
            border: 2px solid #2a2218;
            box-shadow: inset -1px -1px 0 #060504, inset 1px 1px 0 #3a3028;
            color: #c4a44e;
            font-family: inherit;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            user-select: none;
            image-rendering: pixelated;
        }

        .hp-btn:active { background: #c4a44e; color: #000; box-shadow: inset 1px 1px 0 #060504, inset -1px -1px 0 #e0c870; }

        .char-class-label {
            font-size: 9px;
            color: #5a5040;
            text-align: center;
            margin-bottom: 5px;
        }

        /* — Ornate health bar frame — */
        .hp-bar-ornate {
            position: relative;
            margin: 0 auto 3px;
            padding: 0 6px;
        }

        .hp-bar-frame {
            position: relative;
            height: 24px;
            background: #0a0804;
            border: 2px solid #3a2820;
            box-shadow:
                inset 0 0 0 1px #1a1408,
                inset 0 1px 0 0 #4a3828,
                0 2px 0 0 #050400,
                0 -1px 0 0 #4a3828;
            image-rendering: pixelated;
        }

        .hp-bar-fill {
            position: absolute;
            top: 1px;
            left: 1px;
            bottom: 1px;
            width: calc(100% - 2px);
            background: linear-gradient(180deg, #d4865a 0%, #c0503a 30%, #a83828 60%, #8c2820 100%);
            box-shadow:
                inset 0 1px 0 0 rgba(255,200,140,0.35),
                inset 0 -1px 0 0 rgba(60,10,10,0.5);
            transition: width 0.4s ease;
        }

        .hp-bar-fill::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 4px;
            right: 4px;
            height: 2px;
            background: rgba(255,210,160,0.2);
        }

        .hp-bar-fill.low {
            background: linear-gradient(180deg, #cc4040 0%, #a82020 30%, #881818 60%, #601010 100%);
            box-shadow:
                inset 0 1px 0 0 rgba(255,100,100,0.35),
                inset 0 -1px 0 0 rgba(40,5,5,0.5);
        }

        .hp-bar-fill.mid {
            background: linear-gradient(180deg, #d89048 0%, #c06028 30%, #a04818 60%, #803810 100%);
            box-shadow:
                inset 0 1px 0 0 rgba(255,180,100,0.35),
                inset 0 -1px 0 0 rgba(50,15,5,0.5);
        }

        /* Decorative wing flourish on left */
        .hp-wing {
            position: absolute;
            left: -14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }

        .hp-wing::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 16px;
            top: 1px;
            right: 2px;
            background:
                linear-gradient(135deg, transparent 30%, #5a4830 30%, #5a4830 35%, transparent 35%),
                linear-gradient(155deg, transparent 25%, #4a3820 25%, #4a3820 30%, transparent 30%),
                linear-gradient(175deg, transparent 20%, #3a2818 20%, #3a2818 25%, transparent 25%);
        }

        .hp-wing::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 2px;
            width: 7px;
            height: 8px;
            border-radius: 0 0 50% 50%;
            border: 2px solid #4a3820;
            border-top: none;
            background: transparent;
        }

        /* Decorative wing flourish on right (mirrored) */
        .hp-wing-r {
            position: absolute;
            right: -14px;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
            width: 18px;
            height: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }

        .hp-wing-r::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 16px;
            top: 1px;
            right: 2px;
            background:
                linear-gradient(135deg, transparent 30%, #5a4830 30%, #5a4830 35%, transparent 35%),
                linear-gradient(155deg, transparent 25%, #4a3820 25%, #4a3820 30%, transparent 30%),
                linear-gradient(175deg, transparent 20%, #3a2818 20%, #3a2818 25%, transparent 25%);
        }

        .hp-wing-r::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 2px;
            width: 7px;
            height: 8px;
            border-radius: 0 0 50% 50%;
            border: 2px solid #4a3820;
            border-top: none;
            background: transparent;
        }

        /* Tick marks inside bar */
        .hp-bar-ticks {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 8px,
                rgba(0,0,0,0.15) 8px,
                rgba(0,0,0,0.15) 9px
            );
            pointer-events: none;
        }

        /* HP counter below bar */
        .hp-counter {
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: #c4a44e;
            margin-top: 3px;
            letter-spacing: 0.05em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
            transition: color 0.3s;
        }

        .hp-counter.low { color: #e04040; }
        .hp-counter.mid { color: #e07040; }

        .hp-counter .hp-slash {
            color: #4a3820;
            margin: 0 1px;
        }

        .hp-counter .hp-label {
            font-size: 8px;
            color: #4a3820;
            margin-left: 3px;
            font-weight: normal;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ===================== STATS ===================== */
        .core-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-bottom: 5px;
        }

        .stat-box {
            background: #0d0b08;
            border: 2px solid #1a1610;
            box-shadow:
                inset 0 1px 0 #2a2218,
                inset 0 -1px 0 #060504;
            padding: 4px 2px;
            text-align: center;
        }

        .stat-box-icon {
            font-size: 11px;
            margin-bottom: 1px;
            opacity: 0.7;
        }

        .stat-box-label {
            font-size: 8px;
            color: #5a5040;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .stat-box-value {
            font-size: 18px;
            font-weight: bold;
            color: #c4a44e;
            margin-top: 1px;
        }

        .ability-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }

        .ability-box {
            background: #080604;
            border: 1.5px solid #1a1610;
            box-shadow: inset 0 1px 0 rgba(42,34,24,0.5);
            padding: 3px 2px;
            text-align: center;
        }

        .ability-icon {
            font-size: 10px;
            opacity: 0.6;
            line-height: 1.2;
        }

        .ability-label {
            font-size: 8px;
            color: #4a4030;
            text-transform: uppercase;
        }

        .ability-mod {
            font-size: 16px;
            font-weight: bold;
            color: #b8a880;
            margin-top: 1px;
        }

        /* ===================== SPELL SLOTS ===================== */
        .slot-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 4px;
        }

        .slot-level-label {
            font-size: 8px;
            color: #5a5040;
            min-width: 42px;
        }

        .slot-pip {
            width: 12px;
            height: 12px;
            transform: rotate(45deg);
            border: 1.5px solid #3a3028;
            background: #c4a44e;
            box-shadow: inset 0 0 3px rgba(196,164,78,0.4);
            cursor: pointer;
        }

        .slot-pip.spent {
            background: #0a0a08;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }
        .slot-pip:active { border-color: #c8b070; }

        /* ===================== ABILITIES ===================== */
        .ability-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }

        .ability-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #0d0b08;
            border: 1.5px solid #2a2218;
            box-shadow: inset 0 1px 0 #1a1610;
            padding: 4px 7px;
            font-family: inherit;
            font-size: 9px;
            color: #b8a880;
            cursor: pointer;
        }

        .ability-chip.used {
            background: #060504;
            color: #2a2218;
            border-color: #1a1610;
            text-decoration: line-through;
            cursor: default;
        }

        .ability-chip.passive {
            opacity: 0.6;
            cursor: default;
            border-style: dashed;
            border-color: #1a1610;
        }

        .ability-chip:not(.used):not(.passive):active {
            background: #c4a44e;
            color: #000;
        }

        .chip-count {
            font-size: 8px;
            opacity: 0.7;
        }

        /* ===================== INVENTORY ===================== */
        .inv-list {
            min-height: 16px;
            margin-bottom: 5px;
        }

        .inv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 3px;
            border-bottom: 1px solid #1a1610;
            font-size: 10px;
            color: #b8a880;
        }

        .inv-item::before {
            content: '\25C6';
            margin-right: 4px;
            color: #3a3028;
            font-size: 6px;
            flex-shrink: 0;
        }

        .inv-empty {
            font-size: 9px;
            color: #4a4030;
            font-style: italic;
            padding: 6px 0;
            text-align: center;
        }

        .inv-remove {
            background: none;
            border: none;
            color: #4a4030;
            cursor: pointer;
            font-size: 14px;
            padding: 0 3px;
            font-family: inherit;
            line-height: 1;
            flex-shrink: 0;
        }

        .inv-remove:active { color: #e04040; }

        .inv-add {
            display: flex;
            gap: 3px;
        }

        .inv-input {
            flex: 1;
            background: #060504;
            border: 1.5px solid #2a2218;
            color: #b8a880;
            padding: 5px 6px;
            font-family: inherit;
            font-size: 10px;
            outline: none;
        }

        .inv-input:focus { border-color: #c4a44e; }
        .inv-input::placeholder { color: #3a3028; }

        .inv-add-btn {
            background: #0d0b08;
            border: 1.5px solid #2a2218;
            color: #c4a44e;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .inv-add-btn:active { background: #c4a44e; color: #000; }

        /* ===================== DICE ===================== */

        /* 3D canvas wrapper */
        .dice-canvas-wrap {
            position: relative;
            width: 100%;
            height: 260px;
            background: #020200;
            border: 2px solid #1a1610;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9);
            border-radius: 0;
            margin-bottom: 6px;
            overflow: hidden;
        }

        #diceCanvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .dice-empty-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1610;
            font-size: 9px;
            font-style: italic;
            pointer-events: none;
        }

        /* Pool bar — shows what's queued */
        .dice-pool-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            padding: 3px 0 5px;
            font-size: 9px;
            color: #4a4030;
        }

        .pool-type-chip {
            display: flex;
            align-items: center;
            gap: 2px;
            background: #0d0b08;
            border: 1px solid #2a2218;
            padding: 2px 5px;
            color: #c4a44e;
            font-weight: bold;
        }

        .pool-type-minus {
            background: none;
            border: none;
            color: #4a4030;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
            padding: 0 1px;
        }

        .pool-type-minus:active { color: #e04040; }

        /* Result bar */
        .dice-result-bar {
            background: #060504;
            border: 2px solid #1a1610;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
            padding: 5px 8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dice-result-total {
            font-size: 24px;
            font-weight: bold;
            color: #c4a44e;
            line-height: 1;
            flex-shrink: 0;
        }

        .dice-result-total.crit { color: #4aff4a; }
        .dice-result-total.fail { color: #e04040; }

        .dice-result-breakdown {
            font-size: 8px;
            color: #4a4030;
            line-height: 1.7;
        }

        /* Roll / Clear buttons */
        .dice-actions {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }

        .roll-all-btn {
            flex: 1;
            background: linear-gradient(180deg, #d4a84e 0%, #a07828 100%);
            border: 2px solid #8a6820;
            box-shadow: inset 0 1px 0 rgba(255,220,140,0.3);
            color: #1a1000;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .roll-all-btn:disabled {
            background: #0d0b08;
            border-color: #1a1610;
            color: #2a2218;
            box-shadow: none;
            cursor: default;
        }
        .roll-all-btn:not(:disabled):active { background: linear-gradient(180deg, #e0b858 0%, #b08830 100%); }

        .clear-btn {
            background: #0d0b08;
            border: 1.5px solid #2a2218;
            color: #4a4030;
            font-family: inherit;
            font-size: 10px;
            padding: 8px 10px;
            cursor: pointer;
        }

        .clear-btn:active { background: #12100c; }

        /* Die picker at the bottom */
        .die-picker {
            border-top: 1.5px solid #1a1610;
            padding-top: 6px;
        }

        .die-picker-label {
            font-size: 8px;
            color: #3a3028;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .die-picker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }

        .add-die-btn {
            background: #0d0b08;
            border: 1.5px solid #2a2218;
            color: #5a5040;
            font-family: inherit;
            font-size: 10px;
            font-weight: bold;
            padding: 5px 0;
            cursor: pointer;
            flex: 1;
            min-width: 28px;
            text-align: center;
        }

        .add-die-btn:active { background: #1a1610; color: #c4a44e; border-color: #3a3028; }

        /* Roll history */
        .roll-history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            border-bottom: 1px dotted #1a1610;
            font-size: 9px;
            color: #4a4030;
        }

        .roll-history-val { font-weight: bold; color: #c4a44e; }
        .roll-history-val.crit { color: #4aff4a; }
        .roll-history-val.fail { color: #e04040; }

        .roll-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .roll-history-clear {
            background: none;
            border: 1px solid #1a1610;
            color: #3a3028;
            font-family: inherit;
            font-size: 8px;
            padding: 1px 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .roll-history-clear:hover { color: #c4a44e; border-color: #2a2218; }
        .roll-history-clear:active { color: #e04040; }

        /* ===================== TABS ===================== */
        .tab-bar {
            display: flex;
            border-bottom: 2px solid #1a1610;
            background: #080604;
        }

        .tab {
            flex: 1;
            padding: 6px 2px;
            font-family: inherit;
            font-size: 14px;
            font-weight: normal;
            background: #080604;
            border: none;
            border-right: 1px solid #1a1610;
            color: #3a3028;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
        }

        .tab:last-child { border-right: none; }
        .tab:active { background: #0d0b08; }

        .tab.active {
            background: #060504;
            color: #c4a44e;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>

<!-- CHARACTER SELECT SCREEN -->
<div id="selectScreen" class="select-screen" style="display:none">
    <div class="select-title">&#9884; D&amp;D — Choose Your Character &#9884;</div>
    <p class="select-subtitle">Tap your character to open your screen</p>
    <div class="select-cards" id="selectCards"></div>
</div>

<!-- PLAYER SCREEN -->
<div id="playerScreen" class="player-screen" style="display:none">

    <!-- Character header + HP + stats -->
    <div class="win">
        <div class="win-title">
            <div class="close-box" onclick="goBack()" title="Back to character select"></div>
            <div class="win-stripes"></div>
            <span class="win-label" id="charTitle">—</span>
            <div class="win-stripes"></div>
        </div>
        <div class="win-body">
            <div class="char-class-label" id="charClassLabel"></div>
            <div class="hp-bar-ornate">
                <div class="hp-row" style="justify-content:center;">
                    <button class="hp-btn" onclick="changeHp(-1)" title="Take damage">−</button>
                    <div style="flex:1; max-width: 260px; position:relative;">
                        <div class="hp-bar-frame">
                            <div class="hp-wing"></div>
                            <div class="hp-wing-r"></div>
                            <div class="hp-bar-fill" id="hpBar" style="width:100%"></div>
                            <div class="hp-bar-ticks"></div>
                        </div>
                        <div class="hp-counter" id="hpCounter">
                            <span id="hpCurrent">—</span><span class="hp-slash">/</span><span id="hpMaxLabel">—</span><span class="hp-label">&#10018; HP</span>
                        </div>
                    </div>
                    <button class="hp-btn" onclick="changeHp(+1)" title="Heal">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabbed content -->
    <div class="win">
        <div class="tab-bar">
            <button class="tab active" data-tab="sheet" onclick="setTab('sheet')" title="Character">&#9876;</button>
            <button class="tab" data-tab="inventory" onclick="setTab('inventory')" title="Inventory">&#8862;</button>
            <button class="tab" data-tab="dice" onclick="setTab('dice')" title="Dice">&#9860;</button>
        </div>

        <!-- CHARACTER TAB: stats + abilities -->
        <div class="tab-panel active" id="tab-sheet">
            <div class="win-body">
                <div class="core-stats" id="coreStats" style="margin-bottom:6px"></div>
                <div class="ability-grid" id="abilityScores" style="margin-bottom:8px"></div>
                <div id="specialBody"></div>
            </div>
        </div>

        <!-- INVENTORY TAB -->
        <div class="tab-panel" id="tab-inventory">
            <div class="win-body">
                <div class="inv-list" id="invList">
                    <div class="inv-empty">No items yet</div>
                </div>
                <div class="inv-add">
                    <input type="text" class="inv-input" id="invInput" placeholder="Add an item..." maxlength="60">
                    <button class="inv-add-btn" onclick="addItem()">Add</button>
                </div>
            </div>
        </div>

        <!-- DICE TAB -->
        <div class="tab-panel" id="tab-dice">
            <div class="win-body">
                <!-- 3D canvas -->
                <div class="dice-canvas-wrap" id="diceCanvasWrap">
                    <canvas id="diceCanvas"></canvas>
                    <div class="dice-empty-hint" id="diceEmptyHint">&#9860; Add dice from below</div>
                </div>

                <!-- Pool bar: shows queued dice with − per type -->
                <div class="dice-pool-bar" id="dicePoolBar" style="display:none">
                    <span style="color:#3a3e52">Rolling:</span>
                    <span id="dicePoolChips"></span>
                </div>

                <!-- Roll / Clear -->
                <div class="dice-actions">
                    <button class="roll-all-btn" id="rollAllBtn" onclick="rollAll()" disabled>Roll</button>
                    <button class="clear-btn" onclick="clearDice()">Clear</button>
                </div>

                <!-- Result -->
                <div class="dice-result-bar" id="diceResultBar" style="display:none">
                    <div class="dice-result-total" id="diceResultTotal"></div>
                    <div class="dice-result-breakdown" id="diceResultBreakdown"></div>
                </div>

                <!-- History -->
                <div id="rollHistory"></div>

                <!-- Picker -->
                <div class="die-picker">
                    <div class="die-picker-label">&#9860; Add a die</div>
                    <div class="die-picker-row" id="diePickerRow"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // =========================================================
    // FIREBASE
    // =========================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDdZfJ1J0VL9j0UMW5GujimRJISFaun8ls",
        authDomain: "dnd-host.firebaseapp.com",
        databaseURL: "https://dnd-host-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dnd-host",
        storageBucket: "dnd-host.firebasestorage.app",
        messagingSenderId: "89992538920",
        appId: "1:89992538920:web:06e9233db2021981f1fe1d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // =========================================================
    // CHARACTER DATA
    // =========================================================
    const CHARS = {
        akwan: {
            name: 'Akwan Akusian',
            cls: 'Bard — Level 3',
            maxHp: 21, ac: 15, proficiency: 2,
            spellSaveDC: 13, spellAttack: '+5',
            stats: { STR: -1, DEX: 3, CON: 1, INT: 1, WIS: 0, CHA: 3 },
            spellSlots: [
                { label: '1st Level', count: 4, key: '1' },
                { label: '2nd Level', count: 2, key: '2' }
            ],
            abilities: [
                { name: 'Bardic Inspiration', key: 'bardic_inspiration', max: 3, rest: 'Long', passive: false }
            ]
        },
        fiel: {
            name: 'Fiel Amimso',
            cls: 'Halfling Rogue — Level 3',
            maxHp: 24, ac: 13, proficiency: 2,
            spellSaveDC: null, spellAttack: null,
            stats: { STR: -1, DEX: 3, CON: 2, INT: 0, WIS: 2, CHA: -1 },
            spellSlots: [],
            abilities: [
                { name: 'Sneak Attack 2d6', passive: true, desc: 'Once per turn, +2d6 with advantage or adjacent ally' },
                { name: 'Cunning Action', passive: true, desc: 'Bonus action: Dash, Disengage, or Hide' },
                { name: 'Fast Hands', passive: true, desc: 'Bonus action: Use Object' },
                { name: 'Lucky', passive: true, desc: 'Reroll natural 1s on attack, ability, or saving throw' }
            ]
        },
        flicker: {
            name: 'Flicker',
            cls: 'Changeling Warlock — Level 3',
            maxHp: 24, ac: 15, proficiency: 2,
            spellSaveDC: 13, spellAttack: '+5',
            stats: { STR: -1, DEX: 2, CON: 2, INT: 0, WIS: 0, CHA: 3 },
            spellSlots: [
                { label: '2nd (Short Rest)', count: 2, key: 'w' }
            ],
            abilities: [
                { name: 'Fey Presence', key: 'fey_presence', max: 1, rest: 'Short', passive: false }
            ]
        }
    };

    // =========================================================
    // APP STATE
    // =========================================================
    let charKey = null;
    let char = null;
    let currentHp = null;
    let rollHistory   = [];
    let dicePoolCounts = {}; // {sides: count}
    let isRolling     = false;
    // spellSlotState and abilityState are now managed by Firebase

    // =========================================================
    // INIT
    // =========================================================
    function init() {
        const params = new URLSearchParams(window.location.search);
        charKey = (params.get('char') || '').toLowerCase();
        char = CHARS[charKey];

        if (!char) {
            buildSelectScreen();
            document.getElementById('selectScreen').style.display = 'flex';
        } else {
            buildPlayerScreen();
            document.getElementById('playerScreen').style.display = 'flex';
        }
    }

    // =========================================================
    // SELECT SCREEN
    // =========================================================
    function buildSelectScreen() {
        document.title = 'D&D \u2014 Choose Character';
        const container = document.getElementById('selectCards');
        const classIcons = { akwan: '\u266A', fiel: '\u2694', flicker: '\u2727' };
        Object.entries(CHARS).forEach(([key, c]) => {
            const btn = document.createElement('button');
            btn.className = 'select-card';
            const icon = classIcons[key] || '\u2694';
            btn.innerHTML =
                '<div><div class="select-name">' + icon + ' ' + c.name + '</div>' +
                '<div class="select-class">' + c.cls + '</div></div>' +
                '<span class="select-arrow">\u25B6</span>';
            btn.onclick = () => { window.location.search = '?char=' + key; };
            container.appendChild(btn);
        });
    }

    function goBack() {
        window.location.search = '';
    }

    // =========================================================
    // PLAYER SCREEN — BUILD
    // =========================================================
    function buildPlayerScreen() {
        document.title = char.name + ' — D&D';
        document.getElementById('charTitle').textContent = char.name;
        document.getElementById('charClassLabel').textContent = char.cls;

        buildCoreStats();
        buildAbilityScores();
        buildSpecial();
        buildDicePicker();
        startFirebaseSync();
    }

    function buildCoreStats() {
        const container = document.getElementById('coreStats');
        const statIcons = { 'AC': '\u26E8', 'Proficiency': '\u2726', 'Spell Save DC': '\u2727', 'Initiative': '\u2694' };
        const items = [
            { label: 'AC', value: char.ac },
            { label: 'Proficiency', value: '+' + char.proficiency },
            char.spellSaveDC
                ? { label: 'Spell Save DC', value: char.spellSaveDC }
                : { label: 'Initiative', value: fmtMod(char.stats.DEX) }
        ];
        items.forEach(item => {
            const box = document.createElement('div');
            box.className = 'stat-box';
            box.innerHTML =
                '<div class="stat-box-icon">' + (statIcons[item.label] || '') + '</div>' +
                '<div class="stat-box-value">' + item.value + '</div>' +
                '<div class="stat-box-label">' + item.label + '</div>';
            container.appendChild(box);
        });
    }

    function buildAbilityScores() {
        const container = document.getElementById('abilityScores');
        const abilIcons = { STR:'\u2692', DEX:'\u21AF', CON:'\u2665', INT:'\u25C8', WIS:'\u25C9', CHA:'\u265B' };
        Object.entries(char.stats).forEach(([stat, mod]) => {
            const box = document.createElement('div');
            box.className = 'ability-box';
            box.innerHTML =
                '<div class="ability-icon">' + (abilIcons[stat] || '') + '</div>' +
                '<div class="ability-mod">' + fmtMod(mod) + '</div>' +
                '<div class="ability-label">' + stat + '</div>';
            container.appendChild(box);
        });
    }

    function buildSpecial() {
        const body = document.getElementById('specialBody');
        const hasSlots = char.spellSlots.length > 0;
        const activeAbils = char.abilities.filter(a => !a.passive);
        const passiveAbils = char.abilities.filter(a => a.passive);
        const abilityIcons = {
            'Bardic Inspiration': '\u266A', 'Sneak Attack 2d6': '\u2694', 'Cunning Action': '\u26A1',
            'Fast Hands': '\u270B', 'Lucky': '\u2726', 'Fey Presence': '\u2727'
        };

        function makeSectionLabel(text) {
            const el = document.createElement('div');
            el.className = 'section-label';
            el.innerHTML = '<span>' + text + '</span>';
            return el;
        }

        function makeDivider() {
            const el = document.createElement('div');
            el.className = 'section-divider';
            el.innerHTML = '\u2014 \u2726 \u2014';
            return el;
        }

        // Spell slots section
        if (hasSlots) {
            body.appendChild(makeSectionLabel('\u2726 Spell Slots'));

            char.spellSlots.forEach(slot => {
                const row = document.createElement('div');
                row.className = 'slot-row';
                const lbl = document.createElement('span');
                lbl.className = 'slot-level-label';
                lbl.innerHTML = '\u2726 ' + slot.label;
                row.appendChild(lbl);
                for (let i = 0; i < slot.count; i++) {
                    const pip = document.createElement('div');
                    pip.className = 'slot-pip';
                    pip.dataset.slotKey = slot.key + '_' + i;
                    pip.onclick = () => {
                        const spent = !pip.classList.contains('spent');
                        pip.classList.toggle('spent', spent);
                        db.ref('characters/' + charKey + '/slots/' + pip.dataset.slotKey).set(spent);
                    };
                    row.appendChild(pip);
                }
                body.appendChild(row);
            });

            if (activeAbils.length > 0) body.appendChild(makeDivider());
        }

        // Active abilities
        if (activeAbils.length > 0) {
            body.appendChild(makeSectionLabel('\u2694 Abilities'));

            const chips = document.createElement('div');
            chips.className = 'ability-chips';
            activeAbils.forEach(a => {
                const btn = document.createElement('button');
                btn.className = 'ability-chip';
                btn.dataset.abilityKey = a.key;
                btn.dataset.abilityMax = a.max;
                const countSpan = document.createElement('span');
                countSpan.className = 'chip-count';
                countSpan.textContent = a.max + '/' + a.max;
                const icon = abilityIcons[a.name] || '\u2726';
                btn.textContent = icon + ' ' + a.name + ' ';
                btn.appendChild(countSpan);
                btn.onclick = () => {
                    if (btn.classList.contains('used')) return;
                    const currentUsed = parseInt(btn.dataset.currentUsed || '0') + 1;
                    db.ref('characters/' + charKey + '/abilities/' + a.key).set(currentUsed);
                };
                chips.appendChild(btn);
            });
            body.appendChild(chips);

            if (passiveAbils.length > 0) body.appendChild(makeDivider());
        }

        // Passive abilities
        if (passiveAbils.length > 0) {
            body.appendChild(makeSectionLabel('\u25C9 Passive Features'));

            const chips = document.createElement('div');
            chips.className = 'ability-chips';
            passiveAbils.forEach(a => {
                const btn = document.createElement('button');
                btn.className = 'ability-chip passive';
                const icon = abilityIcons[a.name] || '\u25C8';
                btn.textContent = icon + ' ' + a.name;
                btn.title = a.desc || '';
                btn.disabled = true;
                chips.appendChild(btn);
            });
            body.appendChild(chips);
        }
    }

    function setTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    }

    // =========================================================
    // DICE POOL (delegates to window.DiceEngine set up by the
    // Three.js module further down the page)
    // =========================================================
    function buildDicePicker() {
        const row = document.getElementById('diePickerRow');
        [4, 6, 8, 10, 12, 20, 100].forEach(sides => {
            const btn = document.createElement('button');
            btn.className = 'add-die-btn';
            btn.textContent = 'd' + sides;
            btn.onclick = () => addDie(sides);
            row.appendChild(btn);
        });
    }

    function addDie(sides) {
        if (isRolling) return;
        dicePoolCounts[sides] = (dicePoolCounts[sides] || 0) + 1;
        window.DiceEngine && window.DiceEngine.addDie(sides);
        document.getElementById('diceEmptyHint').style.display = 'none';
        document.getElementById('rollAllBtn').disabled = false;
        updatePoolBar();
    }

    function removeOneDie(sides) {
        if (isRolling || !dicePoolCounts[sides]) return;
        dicePoolCounts[sides]--;
        if (dicePoolCounts[sides] === 0) delete dicePoolCounts[sides];
        window.DiceEngine && window.DiceEngine.removeOne(sides);
        updatePoolBar();
        if (Object.keys(dicePoolCounts).length === 0) {
            document.getElementById('diceEmptyHint').style.display = 'flex';
            document.getElementById('rollAllBtn').disabled = true;
        }
    }

    function clearDice() {
        if (isRolling) return;
        dicePoolCounts = {};
        window.DiceEngine && window.DiceEngine.clearAll();
        document.getElementById('diceEmptyHint').style.display = 'flex';
        document.getElementById('rollAllBtn').disabled = true;
        document.getElementById('dicePoolBar').style.display = 'none';
        document.getElementById('diceResultBar').style.display = 'none';
    }

    function updatePoolBar() {
        const bar   = document.getElementById('dicePoolBar');
        const chips = document.getElementById('dicePoolChips');
        const counts = Object.entries(dicePoolCounts);
        if (counts.length === 0) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';
        chips.innerHTML = '';
        counts.forEach(([sides, n]) => {
            const chip = document.createElement('span');
            chip.className = 'pool-type-chip';
            chip.innerHTML =
                `${n}× d${sides}` +
                `<button class="pool-type-minus" onclick="removeOneDie(${sides})" title="Remove one d${sides}">−</button>`;
            chips.appendChild(chip);
        });
    }

    // =========================================================
    // ROLLING
    // =========================================================
    function rollAll() {
        if (isRolling || Object.keys(dicePoolCounts).length === 0) return;
        isRolling = true;
        document.getElementById('rollAllBtn').disabled = true;
        document.getElementById('diceResultBar').style.display = 'none';

        // Pre-compute all results
        const rolls = [];
        Object.entries(dicePoolCounts).forEach(([sides, n]) => {
            for (let i = 0; i < n; i++) {
                rolls.push({ sides: +sides, result: Math.floor(Math.random() * +sides) + 1 });
            }
        });

        // Hand off to physics engine; it calls back when settled
        window.DiceEngine.throwAll(rolls, () => {
            showResults(rolls);
            isRolling = false;
            document.getElementById('rollAllBtn').disabled = false;
        });
    }

    function showResults(rolls) {
        const total = rolls.reduce((s, r) => s + r.result, 0);
        const isTotalCrit = rolls.length === 1 && rolls[0].sides === 20 && rolls[0].result === 20;
        const isTotalFail = rolls.length === 1 && rolls[0].sides === 20 && rolls[0].result === 1;

        const totalEl = document.getElementById('diceResultTotal');
        totalEl.textContent = total;
        totalEl.className = 'dice-result-total' + (isTotalCrit ? ' crit' : isTotalFail ? ' fail' : '');

        const breakdown = rolls.map(r => `d${r.sides}:${r.result}`).join('  ');
        document.getElementById('diceResultBreakdown').textContent =
            rolls.length > 1 ? breakdown + '  =  ' + total
                             : (isTotalCrit ? 'Critical Hit!' : isTotalFail ? 'Critical Fail' : breakdown);
        document.getElementById('diceResultBar').style.display = 'flex';

        const historyLabel = rolls.map(r => `d${r.sides}`).join('+');
        const suffix = isTotalCrit ? ' CRIT!' : isTotalFail ? ' FAIL' : '';
        rollHistory.unshift({ label: historyLabel, total, isTotalCrit, isTotalFail, suffix });
        if (rollHistory.length > 6) rollHistory.pop();
        renderRollHistory();

        db.ref('diceLog').push({
            character: char.name,
            charKey,
            dice:      historyLabel,
            result:    total,
            timestamp: Date.now(),
        });
    }

    // =========================================================
    // FIREBASE SYNC
    // =========================================================
    function startFirebaseSync() {
        const charRef = db.ref('characters/' + charKey);

        // Initialise HP if this character has never connected before
        charRef.child('hp').once('value', snap => {
            if (snap.val() === null) {
                charRef.update({ hp: char.maxHp, maxHp: char.maxHp });
            }
        });

        // Live HP updates
        charRef.child('hp').on('value', snap => {
            const hp = snap.val();
            if (hp !== null) updateHpDisplay(hp);
        });

        // Live inventory updates
        charRef.child('inventory').on('value', snap => {
            renderInventory(snap.val() || {});
        });

        // Initialise spell slots in Firebase if not set
        if (char.spellSlots.length > 0) {
            charRef.child('slots').once('value', snap => {
                if (!snap.val()) {
                    const defaults = {};
                    char.spellSlots.forEach(s => {
                        for (let i = 0; i < s.count; i++) defaults[s.key + '_' + i] = false;
                    });
                    charRef.child('slots').set(defaults);
                }
            });
        }

        // Initialise abilities in Firebase if not set
        const activeAbils = char.abilities.filter(a => !a.passive && a.key);
        if (activeAbils.length > 0) {
            charRef.child('abilities').once('value', snap => {
                if (!snap.val()) {
                    const defaults = {};
                    activeAbils.forEach(a => { defaults[a.key] = 0; });
                    charRef.child('abilities').set(defaults);
                }
            });
        }

        // Live slot updates (DM or rest changes sync here)
        charRef.child('slots').on('value', snap => {
            const slots = snap.val() || {};
            Object.entries(slots).forEach(([key, spent]) => {
                const pip = document.querySelector('[data-slot-key="' + key + '"]');
                if (pip) pip.classList.toggle('spent', spent);
            });
        });

        // Live ability updates
        charRef.child('abilities').on('value', snap => {
            const abilities = snap.val() || {};
            Object.entries(abilities).forEach(([key, used]) => {
                const btn = document.querySelector('[data-ability-key="' + key + '"]');
                if (!btn) return;
                const max = parseInt(btn.dataset.abilityMax);
                btn.dataset.currentUsed = String(used);
                btn.querySelector('.chip-count').textContent = (max - used) + '/' + max;
                btn.classList.toggle('used', used >= max);
            });
        });
    }

    // =========================================================
    // HP
    // =========================================================
    function updateHpDisplay(hp) {
        currentHp = hp;
        const pct = Math.max(0, hp / char.maxHp);
        const hpEl      = document.getElementById('hpCurrent');
        const barEl     = document.getElementById('hpBar');
        const counterEl = document.getElementById('hpCounter');
        const suffix    = pct <= 0.25 ? ' low' : pct <= 0.5 ? ' mid' : '';

        hpEl.textContent = hp;
        document.getElementById('hpMaxLabel').textContent = char.maxHp;
        barEl.style.width = (pct * 100) + '%';
        barEl.className = 'hp-bar-fill' + suffix;
        counterEl.className = 'hp-counter' + suffix;
    }

    function changeHp(delta) {
        if (currentHp === null) return;
        db.ref('characters/' + charKey + '/hp').transaction(hp => {
            const cur = hp !== null ? hp : char.maxHp;
            return Math.max(0, Math.min(char.maxHp, cur + delta));
        });
    }

    // =========================================================
    // INVENTORY
    // =========================================================
    function renderInventory(items) {
        const list = document.getElementById('invList');
        list.innerHTML = '';
        const keys = Object.keys(items);
        if (keys.length === 0) {
            list.innerHTML = '<div class="inv-empty">\u2694 Your pack is empty \u2694</div>';
            return;
        }
        keys.forEach(key => {
            const row = document.createElement('div');
            row.className = 'inv-item';
            const name = document.createElement('span');
            name.textContent = items[key];
            const removeBtn = document.createElement('button');
            removeBtn.className = 'inv-remove';
            removeBtn.textContent = '×';
            removeBtn.title = 'Remove item';
            removeBtn.onclick = () => {
                db.ref('characters/' + charKey + '/inventory/' + key).remove();
            };
            row.appendChild(name);
            row.appendChild(removeBtn);
            list.appendChild(row);
        });
    }

    function addItem() {
        const input = document.getElementById('invInput');
        const val = input.value.trim();
        if (!val) return;
        db.ref('characters/' + charKey + '/inventory').push(val);
        input.value = '';
        input.focus();
    }

    document.getElementById('invInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addItem();
    });

    // =========================================================
    // ROLL HISTORY
    // =========================================================
    function renderRollHistory() {
        const container = document.getElementById('rollHistory');
        container.innerHTML = '';
        if (rollHistory.length === 0) return;

        const header = document.createElement('div');
        header.className = 'roll-history-header';
        header.innerHTML =
            '<span class="die-picker-label" style="margin:0">\u2726 History</span>' +
            '<button class="roll-history-clear" onclick="clearRollHistory()">clear</button>';
        container.appendChild(header);

        rollHistory.forEach(entry => {
            const row = document.createElement('div');
            row.className = 'roll-history-row';
            const valCls = entry.isTotalCrit ? ' crit' : entry.isTotalFail ? ' fail' : '';
            row.innerHTML =
                '<span>' + entry.label + '</span>' +
                '<span class="roll-history-val' + valCls + '">' + entry.total + entry.suffix + '</span>';
            container.appendChild(row);
        });
    }

    function clearRollHistory() {
        rollHistory = [];
        renderRollHistory();
    }

    // =========================================================
    // HELPERS
    // =========================================================
    function fmtMod(mod) {
        return mod >= 0 ? '+' + mod : String(mod);
    }

    // =========================================================
    // START
    // =========================================================
    init();
</script>

<!-- =========================================================
     THREE.JS + CANNON-ES DICE ENGINE
     Exposes window.DiceEngine = { addDie, removeOne, clearAll, throwAll }
     ========================================================= -->
<script type="module">
import * as THREE from 'three';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
import * as CANNON from 'https://cdn.skypack.dev/cannon-es';

// ── Scene setup ─────────────────────────────────────────────
const wrap     = document.getElementById('diceCanvasWrap');
const canvas   = document.getElementById('diceCanvas');

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.shadowMap.enabled = true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 300);
camera.position.set(0, 18, 10);
camera.lookAt(0, 0, 0);

// Lights
scene.add(new THREE.AmbientLight(0xfff5e0, 0.7));
const sun = new THREE.PointLight(0xfff5e0, 1.2);
sun.position.set(8, 20, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);

// Dark table floor (receives shadows, barely visible)
const floorMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.ShadowMaterial({ opacity: 0.18 })
);
floorMesh.receiveShadow = true;
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = -0.5;
scene.add(floorMesh);

// ── Physics world ────────────────────────────────────────────
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -20, 0) });
world.allowSleep = true;
world.defaultContactMaterial.restitution = 0.5;
world.defaultContactMaterial.friction    = 0.4;

const floorBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
floorBody.position.y = -0.5;
world.addBody(floorBody);

// Invisible walls to keep dice in view
[
    { pos: [-9, 4, 0],  axis: [0,0,1], ang: -Math.PI/2 },
    { pos: [ 9, 4, 0],  axis: [0,0,1], ang:  Math.PI/2 },
    { pos: [ 0, 4,-7],  axis: [1,0,0], ang:  Math.PI/2 },
    { pos: [ 0, 4, 7],  axis: [1,0,0], ang: -Math.PI/2 },
].forEach(w => {
    const b = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
    b.position.set(...w.pos);
    b.quaternion.setFromAxisAngle(new CANNON.Vec3(...w.axis), w.ang);
    world.addBody(b);
});

// ── Materials ────────────────────────────────────────────────
const MAT_OUTER = new THREE.MeshStandardMaterial({ color: 0xede4c8, roughness: 0.25, metalness: 0.05 });
const MAT_INNER = new THREE.MeshStandardMaterial({ color: 0x1a1410, roughness: 0, metalness: 0.9, side: THREE.DoubleSide });

// ── d6 geometry (from tutorial — rounded box with carved pips) ─
const D6_PARAMS = { segments: 28, edgeRadius: 0.07, notchRadius: 0.13, notchDepth: 0.1 };

function createD6Outer() {
    let geo = new THREE.BoxGeometry(1,1,1, D6_PARAMS.segments, D6_PARAMS.segments, D6_PARAMS.segments);
    const pos = geo.attributes.position;
    const sub = 0.5 - D6_PARAMS.edgeRadius;
    const notchWave = v => {
        v = (1 / D6_PARAMS.notchRadius) * v;
        v = Math.PI * Math.max(-1, Math.min(1, v));
        return D6_PARAMS.notchDepth * (Math.cos(v) + 1);
    };
    const notch = (a, b) => notchWave(a) * notchWave(b);
    const off = 0.23;
    for (let i = 0; i < pos.count; i++) {
        let p = new THREE.Vector3().fromBufferAttribute(pos, i);
        const s = new THREE.Vector3(Math.sign(p.x), Math.sign(p.y), Math.sign(p.z)).multiplyScalar(sub);
        const d = new THREE.Vector3().subVectors(p, s);
        if (Math.abs(p.x) > sub && Math.abs(p.y) > sub && Math.abs(p.z) > sub) {
            d.normalize().multiplyScalar(D6_PARAMS.edgeRadius); p = s.clone().add(d);
        } else if (Math.abs(p.x) > sub && Math.abs(p.y) > sub) {
            d.z=0; d.normalize().multiplyScalar(D6_PARAMS.edgeRadius); p.x=s.x+d.x; p.y=s.y+d.y;
        } else if (Math.abs(p.x) > sub && Math.abs(p.z) > sub) {
            d.y=0; d.normalize().multiplyScalar(D6_PARAMS.edgeRadius); p.x=s.x+d.x; p.z=s.z+d.z;
        } else if (Math.abs(p.y) > sub && Math.abs(p.z) > sub) {
            d.x=0; d.normalize().multiplyScalar(D6_PARAMS.edgeRadius); p.y=s.y+d.y; p.z=s.z+d.z;
        }
        if      (p.y ===  .5) { p.y -= notch(p.x, p.z); }
        else if (p.x ===  .5) { p.x -= notch(p.y+off,p.z+off); p.x -= notch(p.y-off,p.z-off); }
        else if (p.z ===  .5) { p.z -= notch(p.x-off,p.y+off); p.z -= notch(p.x,p.y); p.z -= notch(p.x+off,p.y-off); }
        else if (p.z === -.5) { p.z += notch(p.x+off,p.y+off); p.z += notch(p.x+off,p.y-off); p.z += notch(p.x-off,p.y+off); p.z += notch(p.x-off,p.y-off); }
        else if (p.x === -.5) { p.x += notch(p.y+off,p.z+off); p.x += notch(p.y+off,p.z-off); p.x += notch(p.y,p.z); p.x += notch(p.y-off,p.z+off); p.x += notch(p.y-off,p.z-off); }
        else if (p.y === -.5) { p.y += notch(p.x+off,p.z+off); p.y += notch(p.x+off,p.z); p.y += notch(p.x+off,p.z-off); p.y += notch(p.x-off,p.z+off); p.y += notch(p.x-off,p.z); p.y += notch(p.x-off,p.z-off); }
        pos.setXYZ(i, p.x, p.y, p.z);
    }
    geo.deleteAttribute('normal'); geo.deleteAttribute('uv');
    geo = BufferGeometryUtils.mergeVertices(geo);
    geo.computeVertexNormals();
    return geo;
}

function createD6Inner() {
    const base = new THREE.PlaneGeometry(1 - 2*D6_PARAMS.edgeRadius, 1 - 2*D6_PARAMS.edgeRadius);
    const o = 0.48;
    return BufferGeometryUtils.mergeGeometries([
        base.clone().translate(0,0,o), base.clone().translate(0,0,-o),
        base.clone().rotateX(Math.PI/2).translate(0,-o,0), base.clone().rotateX(Math.PI/2).translate(0,o,0),
        base.clone().rotateY(Math.PI/2).translate(-o,0,0), base.clone().rotateY(Math.PI/2).translate(o,0,0),
    ], false);
}

// Cached d6 template mesh
const d6Outer = new THREE.Mesh(createD6Outer(), MAT_OUTER);
const d6Inner = new THREE.Mesh(createD6Inner(), MAT_INNER);
d6Outer.castShadow = true;
const D6_TEMPLATE = new THREE.Group();
D6_TEMPLATE.add(d6Inner.clone(), d6Outer.clone());

// ── Geometry map for non-d6 dice ─────────────────────────────
function makePolyMesh(sides) {
    let geo;
    if      (sides === 4)   geo = new THREE.TetrahedronGeometry(0.78, 0);
    else if (sides === 8)   geo = new THREE.OctahedronGeometry(0.72, 0);
    else if (sides === 12)  geo = new THREE.DodecahedronGeometry(0.68, 0);
    else if (sides === 20)  geo = new THREE.IcosahedronGeometry(0.72, 0);
    else if (sides === 10 || sides === 100) {
        // 10-sided pentagonal trapezohedron approximation
        const pts = [], idx = [];
        const n = 5;
        for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2;
            const b = a + Math.PI / n;
            pts.push(new THREE.Vector3(Math.cos(a)*0.65, 0.22, Math.sin(a)*0.65));
            pts.push(new THREE.Vector3(Math.cos(b)*0.65, -0.22, Math.sin(b)*0.65));
        }
        pts.push(new THREE.Vector3(0, 0.75, 0));  // top pole (index 10)
        pts.push(new THREE.Vector3(0, -0.75, 0)); // bottom pole (index 11)
        const g = new THREE.BufferGeometry();
        // Build faces
        const verts = [];
        const addTri = (a,b,c) => { verts.push(pts[a].x,pts[a].y,pts[a].z, pts[b].x,pts[b].y,pts[b].z, pts[c].x,pts[c].y,pts[c].z); };
        for (let i = 0; i < n; i++) {
            const t = i*2, t1 = ((i+1)%n)*2;
            addTri(10, t, t1);      // top cap
            addTri(11, t1+1, t+1);  // bottom cap
            addTri(t, t+1, t1);     // upper side
            addTri(t1, t+1, t1+1);  // lower side
        }
        g.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        g.computeVertexNormals();
        geo = g;
    }
    geo.computeVertexNormals();
    const mat = MAT_OUTER.clone();
    if (sides === 20)  mat.color.set(0xd4c9a8); // slight tint variation
    if (sides === 100) mat.color.set(0xc8d4c0);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    return mesh;
}

// ── Result label sprite ──────────────────────────────────────
function makeResultSprite(text, isCrit, isFail) {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 256;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 256, 256);
    // Dark background circle so number is readable over any die colour
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.arc(128, 128, 110, 0, Math.PI*2); ctx.fill();
    ctx.font = 'bold 130px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = isCrit ? '#4aff4a' : isFail ? '#e04040' : '#ffffff';
    ctx.fillText(text, 128, 128);
    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(3.5, 3.5, 1);
    return sprite;
}

// ── Die pool state ───────────────────────────────────────────
const diceObjects = []; // [{sides, mesh, body, sprite?}]

// ── Resize handler ───────────────────────────────────────────
function resize() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(wrap);

// ── Render loop ──────────────────────────────────────────────
let animating = false;
function startRender() {
    if (animating) return;
    animating = true;
    (function loop() {
        world.fixedStep();
        diceObjects.forEach(d => {
            d.mesh.position.copy(d.body.position);
            d.mesh.quaternion.copy(d.body.quaternion);
            if (d.sprite) {
                d.sprite.position.set(d.body.position.x, d.body.position.y + 2.2, d.body.position.z);
            }
        });
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    })();
}

// ── Public API ───────────────────────────────────────────────
function engineAddDie(sides) {
    let mesh;
    if (sides === 6) {
        mesh = D6_TEMPLATE.clone();
    } else {
        mesh = makePolyMesh(sides);
    }
    // Park off-screen until thrown
    mesh.position.set(999, 999, 999);
    scene.add(mesh);

    const bodyRadius = sides === 6 ? null : 0.72;
    const body = new CANNON.Body({
        mass: 1,
        shape: sides === 6
            ? new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5))
            : new CANNON.Sphere(bodyRadius * 0.9),
        sleepTimeLimit: 0.15,
        linearDamping:  0.04,
        angularDamping: 0.04,
    });
    body.position.set(999, 999, 999);
    body.allowSleep = true;
    world.addBody(body);

    diceObjects.push({ sides, mesh, body, sprite: null, settled: false });
    startRender();
}

function engineRemoveOne(sides) {
    const idx = diceObjects.map(d=>d.sides).lastIndexOf(sides);
    if (idx === -1) return;
    const d = diceObjects.splice(idx, 1)[0];
    scene.remove(d.mesh);
    world.removeBody(d.body);
    if (d.sprite) scene.remove(d.sprite);
}

function engineClearAll() {
    diceObjects.forEach(d => {
        scene.remove(d.mesh);
        world.removeBody(d.body);
        if (d.sprite) scene.remove(d.sprite);
    });
    diceObjects.length = 0;
}

function engineThrowAll(rolls, onSettled) {
    // Remove any result sprites from previous throw
    diceObjects.forEach(d => { if (d.sprite) { scene.remove(d.sprite); d.sprite = null; } d.settled = false; });

    // Assign results to dice in order
    rolls.forEach((r, i) => { if (diceObjects[i]) diceObjects[i].result = r.result; });

    const total = diceObjects.length;
    let settledCount = 0;

    diceObjects.forEach((d, i) => {
        d.body.wakeUp();
        d.body.velocity.setZero();
        d.body.angularVelocity.setZero();

        // Drop from above, scattered across the table
        const startX = (Math.random() - 0.5) * 10;
        const startZ = (Math.random() - 0.5) *  7;
        d.body.position.set(startX, 7 + i * 0.6, startZ);
        d.mesh.position.copy(d.body.position);

        // Random initial orientation
        d.mesh.rotation.set(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);
        d.body.quaternion.copy(d.mesh.quaternion);

        // Strong tumbling angular velocity so dice spin a lot on the way down
        d.body.angularVelocity.set(
            (Math.random()-0.5)*25,
            (Math.random()-0.5)*25,
            (Math.random()-0.5)*25
        );

        // Small horizontal nudge so dice drift a little
        d.body.applyImpulse(
            new CANNON.Vec3((Math.random()-0.5)*3, 0, (Math.random()-0.5)*3),
            new CANNON.Vec3(0, 0, 0)
        );
        d.body.allowSleep = true;

        // Sleep listener — show result when settled
        const onSleep = () => {
            if (d.settled) return;
            d.settled = true;
            d.body.removeEventListener('sleep', onSleep);

            const isCrit = d.sides === 20 && d.result === 20;
            const isFail = d.sides === 20 && d.result === 1;
            const sprite = makeResultSprite(String(d.result), isCrit, isFail);
            sprite.position.set(d.body.position.x, d.body.position.y + 2.2, d.body.position.z);
            scene.add(sprite);
            d.sprite = sprite;

            settledCount++;
            if (settledCount === total) onSettled();
        };
        d.body.addEventListener('sleep', onSleep);

        // Safety timeout — if physics never sleeps, force-settle after 6s
        setTimeout(() => {
            if (!d.settled) {
                d.body.sleep();
                onSleep();
            }
        }, 6000);
    });
}

window.DiceEngine = {
    addDie:   engineAddDie,
    removeOne: engineRemoveOne,
    clearAll:  engineClearAll,
    throwAll:  engineThrowAll,
};
</script>
