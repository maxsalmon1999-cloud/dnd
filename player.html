<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Player Screen</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Geneva', 'Chicago', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            background: #0e0a0c;
            background-image:
                radial-gradient(ellipse at center, #160e12 0%, #0e0a0c 60%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(40,15,20,0.04) 2px, rgba(40,15,20,0.04) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(30,10,15,0.02) 3px, rgba(30,10,15,0.02) 6px);
            color: #c4a44e;
            min-height: 100vh;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1018; }
        ::-webkit-scrollbar-thumb { background: #4a2030; border: 1px solid #6b2a3a; }
        ::-webkit-scrollbar-thumb:hover { background: #5a2838; }

        /* ===================== SELECT SCREEN ===================== */
        .select-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
            gap: 16px;
        }

        .select-title {
            font-size: 12px;
            font-weight: bold;
            color: #c4a44e;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-align: center;
            border-bottom: 1px solid #4a2030;
            padding-bottom: 12px;
            width: 100%;
            max-width: 320px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 8px rgba(196,164,78,0.15);
        }

        .select-subtitle {
            font-size: 10px;
            color: #5a4048;
            text-align: center;
            margin-top: -8px;
        }

        .select-cards {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 320px;
        }

        .select-card {
            background: #1a1018;
            border: 2px solid #4a2030;
            box-shadow:
                inset 0 1px 0 rgba(107,26,42,0.3),
                inset 0 -1px 0 #0e0a0c,
                2px 2px 0 #080608;
            padding: 10px 12px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: #c4a44e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .select-card::before {
            content: '';
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            border: 1px solid rgba(107,26,42,0.25);
            pointer-events: none;
        }

        .select-card:hover, .select-card:active {
            background: #241820;
            color: #d4b45e;
            border-color: #8c2a3a;
            box-shadow:
                inset 0 1px 0 rgba(140,42,58,0.4),
                inset 0 -1px 0 #0e0a0c,
                2px 2px 0 #080608,
                0 0 10px rgba(107,26,42,0.3);
        }

        .select-card:hover .select-class,
        .select-card:active .select-class {
            color: #8a6050;
        }

        .select-card:hover .select-arrow,
        .select-card:active .select-arrow {
            color: #d4b45e;
        }

        .select-name { font-weight: bold; font-size: 12px; }
        .select-class { font-size: 10px; color: #5a4048; margin-top: 2px; }
        .select-arrow { font-size: 11px; color: #4a2030; }

        /* ===================== PLAYER SCREEN ===================== */
        .player-screen {
            display: flex;
            flex-direction: column;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 6px;
            gap: 5px;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .player-screen > .win:last-child {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .player-screen > .win:last-child .tab-panel.active {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .player-screen > .win:last-child .tab-panel.active .win-body {
            flex: 1;
            overflow-y: auto;
        }

        /* Window chrome — ornate retro beveled */
        .win {
            background: #1a1018;
            border: 3px solid #4a2030;
            box-shadow:
                inset 0 0 0 1px #2a1520,
                inset 0 0 0 2px #120c10,
                2px 2px 0 #080608,
                0 0 12px rgba(74,32,48,0.4);
            position: relative;
        }

        /* Ornate corner flourishes */
        .win::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(107,26,42,0.2);
            pointer-events: none;
            z-index: 0;
        }

        .win::before {
            content: '\269C';
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #6b2a3a;
            z-index: 2;
            text-shadow: 0 0 6px rgba(107,42,58,0.5), 0 1px 2px #000;
            line-height: 1;
        }

        .win-title {
            background: linear-gradient(180deg, #2a1520 0%, #1e1018 50%, #2a1520 100%);
            border-bottom: 2px solid #4a2030;
            padding: 6px 6px;
            display: flex;
            align-items: center;
            min-height: 42px;
            position: relative;
            z-index: 1;
        }

        .close-box {
            width: 13px;
            height: 13px;
            border: 1.5px solid #6b2a3a;
            background: #1a1018;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-box::after {
            content: '\2020';
            font-size: 9px;
            color: #8a6050;
            line-height: 1;
        }

        .close-box:active { background: #c4a44e; }
        .close-box:active::after { color: #0e0a0c; }

        .win-stripes {
            flex: 1;
            height: 10px;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px, transparent 2px,
                #2a1520 2px, #2a1520 3px
            );
            margin: 0 5px;
        }

        .win-label {
            font-size: 20px;
            font-weight: bold;
            font-family: 'Geneva', 'Chicago', 'Monaco', 'Courier New', monospace;
            -webkit-font-smoothing: none;
            color: #c4a44e;
            flex-shrink: 0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8), 0 0 6px rgba(196,164,78,0.15);
            cursor: pointer;
        }

        .win-body {
            padding: 10px;
            background: #120c10;
            position: relative;
            z-index: 1;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(74,32,48,0.02) 1px, rgba(74,32,48,0.02) 2px),
                repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(74,32,48,0.01) 1px, rgba(74,32,48,0.01) 2px);
        }

        .sheet-layout {
            display: block;
        }

        .sheet-panel {
            margin-bottom: 8px;
        }

        .sheet-panel:last-child {
            margin-bottom: 0;
        }

        .sheet-section-group + .sheet-section-group {
            margin-top: 10px;
        }

        .sheet-section-group + .sheet-section-group::before {
            content: '\2014 \2726 \2014';
            display: block;
            text-align: center;
            font-size: 10px;
            color: #4a2030;
            line-height: 1;
            margin-bottom: 8px;
        }
        .sheet-section-group.no-divider::before { content: none; }

        /* Section label — ornate divider lines */
        .section-label {
            font-size: 11px;
            font-weight: bold;
            color: #8a6050;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a2030, transparent);
        }

        .spell-level-label {
            font-size: 10px;
            font-weight: bold;
            color: #8a6050;
            padding: 4px 0 2px;
        }

        .ability-chip.spell {
            opacity: 0.8;
            border-style: solid;
            border-color: #3a2040;
        }

        /* Ornate section divider */
        .section-divider {
            text-align: center;
            border: none;
            margin: 5px 0;
            font-size: 10px;
            color: #4a2030;
            line-height: 1;
        }

        /* ===================== HP ===================== */
        .hp-row {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 3px;
        }

        .hp-btn {
            width: 52px;
            height: 52px;
            background: #1a1018;
            border: 2px solid #4a2030;
            box-shadow:
                inset -1px -1px 0 #0e0a0c,
                inset 1px 1px 0 #6b2a3a;
            color: #c4a44e;
            font-family: inherit;
            font-size: 28px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            user-select: none;
            image-rendering: pixelated;
            touch-action: manipulation;
        }

        .hp-btn:active { background: #c4a44e; color: #0e0a0c; box-shadow: inset 1px 1px 0 #0e0a0c, inset -1px -1px 0 #d4b45e; }

        .char-class-label {
            font-size: 12px;
            color: #5a4048;
            text-align: center;
            margin-bottom: 6px;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 2px;
        }

        .char-class-label:hover {
            color: #8a6050;
        }

        /* — Ornate health bar frame — */
        .hp-bar-ornate {
            position: relative;
            margin: 0 auto 3px;
            padding: 0 6px;
        }

        .hp-bar-frame {
            position: relative;
            height: 32px;
            background: #120c10;
            border: 2px solid #6b1a2a;
            box-shadow:
                inset 0 0 0 1px #2a1018,
                inset 0 1px 0 0 #8c2a3a,
                0 2px 0 0 #080608,
                0 -1px 0 0 #8c2a3a;
            image-rendering: pixelated;
        }

        .hp-bar-fill {
            position: absolute;
            top: 1px;
            left: 1px;
            bottom: 1px;
            width: calc(100% - 2px);
            background: linear-gradient(180deg, #d45a5a 0%, #b83040 30%, #8c2a3a 60%, #6b1a2a 100%);
            box-shadow:
                inset 0 1px 0 0 rgba(255,140,140,0.35),
                inset 0 -1px 0 0 rgba(40,10,15,0.5);
            transition: width 0.4s ease;
        }

        .hp-bar-fill::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 4px;
            right: 4px;
            height: 2px;
            background: rgba(255,160,160,0.2);
        }

        .hp-bar-fill.low {
            background: linear-gradient(180deg, #cc4040 0%, #a82020 30%, #881818 60%, #601010 100%);
            box-shadow:
                inset 0 1px 0 0 rgba(255,100,100,0.35),
                inset 0 -1px 0 0 rgba(40,5,5,0.5);
        }

        .hp-bar-fill.mid {
            background: linear-gradient(180deg, #d88050 0%, #c05838 30%, #a04028 60%, #803018 100%);
            box-shadow:
                inset 0 1px 0 0 rgba(255,180,100,0.35),
                inset 0 -1px 0 0 rgba(50,15,5,0.5);
        }

        /* Decorative wing flourish on left */
        .hp-wing {
            position: absolute;
            left: -14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }

        .hp-wing::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 16px;
            top: 1px;
            right: 2px;
            background:
                linear-gradient(135deg, transparent 30%, #8c2a3a 30%, #8c2a3a 35%, transparent 35%),
                linear-gradient(155deg, transparent 25%, #6b2a3a 25%, #6b2a3a 30%, transparent 30%),
                linear-gradient(175deg, transparent 20%, #4a2030 20%, #4a2030 25%, transparent 25%);
        }

        .hp-wing::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 2px;
            width: 7px;
            height: 8px;
            border-radius: 0 0 50% 50%;
            border: 2px solid #6b2a3a;
            border-top: none;
            background: transparent;
        }

        /* Decorative wing flourish on right (mirrored) */
        .hp-wing-r {
            position: absolute;
            right: -14px;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
            width: 18px;
            height: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }

        .hp-wing-r::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 16px;
            top: 1px;
            right: 2px;
            background:
                linear-gradient(135deg, transparent 30%, #8c2a3a 30%, #8c2a3a 35%, transparent 35%),
                linear-gradient(155deg, transparent 25%, #6b2a3a 25%, #6b2a3a 30%, transparent 30%),
                linear-gradient(175deg, transparent 20%, #4a2030 20%, #4a2030 25%, transparent 25%);
        }

        .hp-wing-r::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 2px;
            width: 7px;
            height: 8px;
            border-radius: 0 0 50% 50%;
            border: 2px solid #6b2a3a;
            border-top: none;
            background: transparent;
        }


        /* HP counter below bar */
        .hp-counter {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #c4a44e;
            margin-top: 4px;
            letter-spacing: 0.05em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
            transition: color 0.3s;
        }

        .hp-counter.low { color: #e04040; }
        .hp-counter.mid { color: #e07040; }

        .hp-counter .hp-slash {
            color: #6b2a3a;
            margin: 0 1px;
        }

        .hp-counter .hp-label {
            font-size: 11px;
            color: #6b2a3a;
            margin-left: 4px;
            font-weight: normal;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ===================== STATS ===================== */
        .core-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 6px;
        }

        .stat-box {
            background: #1a1018;
            border: 2px solid #2a1520;
            box-shadow:
                inset 0 1px 0 #3a2030,
                inset 0 -1px 0 #0e0a0c;
            padding: 8px 4px;
            text-align: center;
        }

        .stat-box-icon {
            font-size: 14px;
            margin-bottom: 2px;
            opacity: 0.7;
        }

        .stat-box-label {
            font-size: 10px;
            color: #8a6050;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .stat-box-value {
            font-size: 22px;
            font-weight: bold;
            color: #c4a44e;
            margin-top: 2px;
            text-shadow: 0 0 4px rgba(196,164,78,0.15);
        }

        .ability-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .ability-box {
            background: #140e12;
            border: 1.5px solid #2a1520;
            box-shadow: inset 0 1px 0 rgba(74,32,48,0.3);
            padding: 6px 4px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        .ability-box:hover {
            border-color: #6b2a3a;
            background: #1a1018;
        }

        .ability-box:active {
            background: #24131b;
        }

        .ability-box::after {
            content: 'Roll';
            position: absolute;
            top: 4px;
            right: 5px;
            font-size: 8px;
            color: #5a4048;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .ability-icon {
            font-size: 13px;
            opacity: 0.6;
            line-height: 1.2;
        }

        .ability-label {
            font-size: 10px;
            color: #5a4048;
            text-transform: uppercase;
        }

        .ability-mod {
            font-size: 20px;
            font-weight: bold;
            color: #c4a44e;
            margin-top: 2px;
        }

        /* ===================== SPELL SLOTS ===================== */
        .slot-row {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            align-items: center;
            column-gap: 16px;
            margin-bottom: 12px;
        }

        .slot-row:last-child {
            margin-bottom: 0;
        }

        .slot-level-label {
            font-size: 12px;
            color: #8a6050;
            text-align: right;
            white-space: nowrap;
        }

        .slot-pips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 16px;
            min-width: 0;
        }

        .slot-pip {
            width: 30px;
            height: 30px;
            transform: rotate(45deg);
            border: 2px solid #6b2a3a;
            background: linear-gradient(135deg, #d4b45e, #c4a44e, #a08030);
            box-shadow: inset 0 0 6px rgba(196,164,78,0.5), 0 0 8px rgba(196,164,78,0.2);
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .slot-pip.level-2 {
            border-color: #8b93a7;
            background: linear-gradient(135deg, #edf1f7, #c4ccdb, #929cb3);
            box-shadow: inset 0 0 6px rgba(237,241,247,0.45), 0 0 8px rgba(196,204,219,0.2);
        }

        .slot-pip.spent {
            background: #1a1018;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
            border-color: #4a2030;
        }

        .slot-pip.level-2.spent {
            border-color: #545c70;
        }
        .slot-pip:active { border-color: #8c2a3a; box-shadow: 0 0 10px rgba(140,42,58,0.5); }

        /* ===================== ABILITIES ===================== */
        .ability-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .ability-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a1018;
            border: 1.5px solid #4a2030;
            box-shadow: inset 0 1px 0 rgba(107,26,42,0.2);
            padding: 10px 14px;
            font-family: inherit;
            font-size: 13px;
            color: #c4a44e;
            cursor: pointer;
            min-height: 44px;
            touch-action: manipulation;
        }

        .ability-chip.used {
            background: #0e0a0c;
            color: #3a2030;
            border-color: #2a1520;
            text-decoration: line-through;
            cursor: default;
        }

        .ability-chip.passive {
            opacity: 0.6;
            cursor: default;
            border-style: dashed;
            border-color: #2a1520;
        }

        .ability-chip:not(.used):not(.passive):active {
            background: #c4a44e;
            color: #0e0a0c;
        }

        .chip-count {
            font-size: 11px;
            opacity: 0.7;
        }

        .chip-info {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid #6b2a3a;
            color: #6a5040;
            font-size: 11px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .chip-info:hover {
            border-color: #c4a44e;
            color: #c8b070;
        }

        .ability-chip.passive {
            cursor: default;
        }

        #ability-popup {
            display: none;
            position: fixed;
            z-index: 9999;
            background: #1a1018;
            border: 1px solid #6b2a3a;
            border-top-color: #9b3a5a;
            border-left-color: #9b3a5a;
            border-bottom-color: #3a1520;
            border-right-color: #3a1520;
            padding: 10px 14px;
            max-width: 260px;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        #ability-popup .popup-name {
            font-size: 12px;
            color: #c4a44e;
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #ability-popup .popup-desc {
            font-size: 12px;
            color: #8a7060;
            line-height: 1.5;
        }

        /* ===================== INVENTORY ===================== */
        .inv-list {
            min-height: 16px;
            margin-bottom: 5px;
        }

        .inv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 6px;
            border-bottom: 1px solid #2a1520;
            font-size: 13px;
            color: #c4a44e;
            min-height: 48px;
        }

        .inv-item::before {
            content: '\25C6';
            margin-right: 6px;
            color: #6b2a3a;
            font-size: 8px;
            flex-shrink: 0;
        }

        .inv-empty {
            font-size: 11px;
            color: #5a4048;
            font-style: italic;
            padding: 12px 0;
            text-align: center;
        }

        .inv-remove {
            background: none;
            border: none;
            color: #5a4048;
            cursor: pointer;
            font-size: 20px;
            padding: 4px 8px;
            font-family: inherit;
            line-height: 1;
            flex-shrink: 0;
        }

        .inv-remove:active { color: #e04040; }

    .inv-add {
        display: flex;
        gap: 4px;
    }

    .sheet-special {
        margin-top: 14px;
    }

        .inv-input {
            flex: 1;
            background: #0e0a0c;

        /* ===================== DICE ===================== */

        /* Ghost element that follows finger during touch drag */

            position: fixed;
            background: #c4a44e;
            color: #0e0a0c;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 18px;

            user-select: none;
            z-index: 9999;
        }

        .dice-strip {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 8px;

            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
            touch-action: none;
        }

        .die-sym canvas { image-rendering: pixelated; }

        .die-sym .die-label {
            position: absolute;

        /* Attack / Damage panels */
        .dice-panel {
            border: 1.5px solid #2a1520;

            background: #100c0e;

        .dice-panel-header {

        .dice-chip {

        .roll-all-btn {

<script>
    // =========================================================
    // FIREBASE
    // =========================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDdZfJ1J0VL9j0UMW5GujimRJISFaun8ls",
        authDomain: "dnd-host.firebaseapp.com",
        databaseURL: "https://dnd-host-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dnd-host",
        storageBucket: "dnd-host.firebasestorage.app",
        messagingSenderId: "89992538920",
        appId: "1:89992538920:web:06e9233db2021981f1fe1d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // =========================================================
    // CHARACTER DATA — loaded from Firebase
    // =========================================================
    let CHARS = {};

    // =========================================================
    // APP STATE
    // =========================================================
    let charKey = null;
    let char = null;
    let currentHp = null;
    let rollHistory = [];
    let pendingRequests = {};
    let pendingGoldRequests = {};
    let activeConditions = {};
    let saveProficiencies = [];
    let skillProficiencies = [];
    let currentGold = 0;
    let currentSlots = {};
    let abilityRollCount = 0;
    let abilityRollLastSummary = '';
    let abilityDiceBox = null;
    let abilityDiceInitPromise = null;
    let abilityRollInFlight = false;
    const ABILITY_DICE_CDN_ORIGIN = "https://unpkg.com/@3d-dice/dice-box@1.1.4/dist/";
    const ABILITY_DICE_DEFAULTS = {
        theme: 'default',
        themeColor: '#111111',
        scale: 8.8,
        gravity: 1.6,
        throwForce: 5.5,
        spinForce: 4.2,
        restitution: 0
    };

    function parseSpellsFromRawMarkdown(text) {
        const lines = String(text || '').split('\n');
        const spells = [];
        let inSpells = false;
        let currentSpellLevel = '';

        for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed) continue;

            // Bullet spell entry — check FIRST because • is non-ASCII and would
            // otherwise trip the section-header guard below
            if (/^[•\-\*]/.test(trimmed)) {
                if (inSpells) {
                    const spellText = trimmed.replace(/^[•\-\*]\s*/, '').replace(/\s*\([^)]*\)\s*$/, '').trim();
                    if (spellText) spells.push({ level: currentSpellLevel, name: spellText });
                }
                continue;
            }

            // Any line that contains "Known Spells" or "Spells Known" enters spell section
            if (/known\s+spells?|spells?\s+known/i.test(trimmed)) {
                inSpells = true;
                continue;
            }

            // A non-ASCII leading character (emoji) means a new section header
            if (/^[^\x00-\x7F]/.test(trimmed)) {
                inSpells = false;
                continue;
            }

            if (!inSpells) continue;

            // Sub-section header (Cantrips, 1st Level, 2nd Level, etc.)
            if (/^(Cantrips?|(\d+)\w*\s+Level|Prepared|At.?Will)\s*[:(]/i.test(trimmed) ||
                /^(Cantrips?|(\d+)\w*\s+Level|Prepared|At.?Will)\s*$/i.test(trimmed)) {
                const raw = trimmed.replace(/[:(].*/, '').trim();
                currentSpellLevel = /^cantrip/i.test(raw) ? 'cantrip' : raw;
                continue;
            }
        }

        return spells;
    }

    function normalizeSpellList(spells) {
        return (Array.isArray(spells) ? spells : []).map(spell => ({
            level: String((spell && spell.level) || '').trim().toLowerCase(),
            name: String((spell && spell.name) || '').trim().toLowerCase()
        }));
    }

    function shouldRepairStoredSpells(storedSpells, parsedSpells) {
        const normalizedStored = normalizeSpellList(storedSpells);
        const normalizedParsed = normalizeSpellList(parsedSpells);
        if (normalizedParsed.length === 0) return false;
        if (normalizedStored.length !== normalizedParsed.length) return true;

        return normalizedStored.some((spell, index) => {
            const parsed = normalizedParsed[index];
            return spell.level !== parsed.level || spell.name !== parsed.name;
        });
    }

    function extractXpFromRawMarkdown(text) {
        const match = String(text || '').match(/XP:\s*([^\n]+)/i);
        return match ? match[1].trim() : null;
    }

    // =========================================================
    // INIT — load characters from Firebase, then proceed
    // =========================================================
    async function init() {
        // Load character sheets from Firebase
        const snap = await db.ref('characterSheets').once('value');
        const sheets = snap.val() || {};
        CHARS = {};
        const spellBackfillUpdates = {};
        Object.entries(sheets).forEach(([key, c]) => {
            const spells = c.rawMarkdown
                ? parseSpellsFromRawMarkdown(c.rawMarkdown)
                : (Array.isArray(c.spells) ? c.spells : (c.spells ? Object.values(c.spells) : []));
            if (spells.length > 0) {
                spellBackfillUpdates['characterSheets/' + key + '/spells'] = spells;
            }
            CHARS[key] = {
                name: c.name,
                cls: c.cls || '',
                level: c.level || 1,
                xp: c.xp || extractXpFromRawMarkdown(c.rawMarkdown),
                maxHp: c.maxHp || 10,
                ac: c.ac || 10,
                proficiency: c.proficiency || 2,
                spellSaveDC: c.spellSaveDC || null,
                spellAttack: c.spellAttack || null,
                stats: c.stats || {},
                spellSlots: c.spellSlots || [],
                abilities: c.abilities || [],
                spells,
            };
        });
        if (Object.keys(spellBackfillUpdates).length > 0) {

            buildSelectScreen();
            document.getElementById('selectScreen').style.display = 'flex';

            document.getElementById('playerScreen').style.display = 'flex';
        }

    function summarizeDiceResults(results) {
        const dice = (Array.isArray(results) ? results : []).map((die) => {
            const value = typeof die.value === 'number' ? die.value : (typeof die.result === 'number' ? die.result : 0);
            return {
                sides: die.sides || die.dieType || '?',
                value
            };
        });

        return {
            dice,
            subtotal: dice.reduce((sum, die) => sum + die.value, 0)
        };
    }

    async function ensureAbilityDiceBox() {
        if (abilityDiceBox) return abilityDiceBox;
        if (abilityDiceInitPromise) return abilityDiceInitPromise;

        abilityDiceInitPromise = (async () => {
            const module = await import('https://unpkg.com/@3d-dice/dice-box@1.1.4/dist/dice-box.es.min.js');
            const DiceBox = module.default;
            const host = document.getElementById('abilityDiceBox');
            host.innerHTML = '';

            abilityDiceBox = new DiceBox({
                container: '#abilityDiceBox',
                assetPath: 'assets/',
                origin: ABILITY_DICE_CDN_ORIGIN,
                theme: ABILITY_DICE_DEFAULTS.theme,
                themeColor: ABILITY_DICE_DEFAULTS.themeColor,
                scale: ABILITY_DICE_DEFAULTS.scale,
                gravity: ABILITY_DICE_DEFAULTS.gravity,
                throwForce: ABILITY_DICE_DEFAULTS.throwForce,
                spinForce: ABILITY_DICE_DEFAULTS.spinForce,
                restitution: ABILITY_DICE_DEFAULTS.restitution,
                lightIntensity: 1.15,
                shadowTransparency: 0.55
            });

            await abilityDiceBox.init();
            return abilityDiceBox;
        })();

        try {
            return await abilityDiceInitPromise;
        } finally {
            if (!abilityDiceBox) abilityDiceInitPromise = null;
        }
    }

    async function rollAbilityCheck(stat, modifier, sourceEl) {
        if (abilityRollInFlight) return;
        abilityRollInFlight = true;

        const overlay = document.getElementById('abilityRollOverlay');
        const stageLabel = document.getElementById('abilityRollStageLabel');
        if (stageLabel) stageLabel.textContent = stat + ' Check';

        try {
            overlay.classList.add('active');
            const diceBox = await ensureAbilityDiceBox();
            await diceBox.clear();
            const results = await diceBox.roll('1d20', {
                theme: ABILITY_DICE_DEFAULTS.theme,
                newStartPoint: true
            });
            const summary = summarizeDiceResults(results);
            const rawRoll = summary.dice[0] ? summary.dice[0].value : 0;
            const total = rawRoll + modifier;

            await new Promise((resolve) => window.setTimeout(resolve, 250));
            overlay.classList.remove('active');

            abilityRollCount += 1;
            abilityRollLastSummary = stat + ': ' + rawRoll + ' ' + (modifier >= 0 ? '+' + modifier : modifier) + ' = ' + total;
            renderAbilityRollCounter();
            showAbilityRollTotal(sourceEl, stat, rawRoll, modifier, total);
        } catch (error) {
            console.error(error);
            overlay.classList.remove('active');
            showAbilityPopup(sourceEl, stat + ' Check', 'Dice roll failed to load. Check the network/CDN path.');
        } finally {
            abilityRollInFlight = false;
        }
    }

    function toggleSaveProficiency(stat) {
        const idx = saveProficiencies.indexOf(stat);
        if (idx !== -1) {
            saveProficiencies = saveProficiencies.filter(s => s !== stat);
        } else {
            if (saveProficiencies.length >= 2) return;
            saveProficiencies = [...saveProficiencies, stat];
        }
        db.ref('characters/' + charKey + '/saveProficiencies').set(saveProficiencies.length > 0 ? saveProficiencies : null);
        refreshSavingThrows();
    }

    function refreshSavingThrows() {
        SAVE_STATS.forEach(stat => {
            const valueEl = document.getElementById('save-value-' + stat);
            if (valueEl) valueEl.textContent = getSaveValue(stat);

            const profBtn = document.querySelector('.save-prof-btn[data-stat="' + stat + '"]');
            if (!profBtn) return;
            const isProficient = saveProficiencies.includes(stat);
            const isMaxed = saveProficiencies.length >= 2 && !isProficient;
            profBtn.classList.toggle('active', isProficient);
            profBtn.disabled = isMaxed;
            profBtn.title = 'Toggle save proficiency (' + saveProficiencies.length + '/2 used)';
        });
    }

    function getAbilityDescription(name, fallback) {
        const normalized = String(name || '')
            .replace(/\s+\([^)]*\)/g, '')
            .replace(/\s+\d+d\d+\b/gi, '')
            .trim();
        return ABILITY_DESCRIPTIONS[name] || ABILITY_DESCRIPTIONS[normalized] || fallback || '';

    function showAbilityPopup(el, name, desc) {
        const popup = document.getElementById('ability-popup');
        popup.querySelector('.popup-name').textContent = name;
        popup.querySelector('.popup-desc').textContent = desc || 'No description available.';
        popup.style.display = 'block';
        const rect = el.getBoundingClientRect();
        let top = rect.bottom + 8;
        let left = rect.left;
        if (left + 274 > window.innerWidth) left = Math.max(4, window.innerWidth - 274);
        if (top + 100 > window.innerHeight) top = rect.top - popup.offsetHeight - 8;
        popup.style.top = top + 'px';
        popup.style.left = left + 'px';
    }

        const body = document.getElementById('specialBody');

        const activeAbils = char.abilities.filter(a => !a.passive);

        const abilityIcons = {

        function makeSectionLabel(text) {
            const el = document.createElement('div');
            el.className = 'section-label';
            el.innerHTML = '<span>' + text + '</span>';
            return el;
        }

        function makeSectionGroup(text) {
            const group = document.createElement('div');
            group.className = 'sheet-section-group';
            group.appendChild(makeSectionLabel(text));
            return group;
        }

        // Active abilities — collapsible
        if (activeAbils.length > 0) {
            const group = document.createElement('div');
            group.className = 'sheet-section-group';

            const abilHeader = document.createElement('div');
            abilHeader.className = 'section-label';
            abilHeader.style.cursor = 'pointer';

            abilHeader.innerHTML = '<span>\u2694 Abilities</span>';

            abilHeader.addEventListener('click', () => {

                abilAccordion.style.display = abilOpen ? 'block' : 'none';
            });

            group.appendChild(abilHeader);
            group.appendChild(abilAccordion);

            const rows = document.createElement('div');
            rows.className = 'spell-cast-list';
            rows.style.paddingTop = '6px';
            activeAbils.forEach(a => {
                const row = document.createElement('div');
                row.className = 'spell-cast-row';

                const btn = document.createElement('button');
                btn.className = 'ability-chip passive spell spell-name-btn';
                btn.dataset.abilityKey = a.key;
                const countSpan = document.createElement('span');
                countSpan.className = 'chip-count';
                countSpan.textContent = a.max + '/' + a.max;
                const icon = abilityIcons[a.name] || '\u2726';
                btn.textContent = icon + ' ' + a.name + ' ';
                btn.appendChild(countSpan);
                const aDesc = getAbilityDescription(a.name, a.desc || '');
                btn.addEventListener('click', () => {
                    showAbilityPopup(btn, a.name, aDesc);
                });

                const castBtn = document.createElement('button');
                castBtn.className = 'spell-cast-btn';
                castBtn.dataset.abilityKey = a.key;
                castBtn.dataset.abilityMax = a.max;
                castBtn.textContent = 'Cast';
                castBtn.addEventListener('click', () => {
                    if (castBtn.disabled) return;
                    const used = parseInt(castBtn.dataset.currentUsed || '0') + 1;
                    const max = parseInt(castBtn.dataset.abilityMax || '0');
                    // Optimistic local update
                    castBtn.dataset.currentUsed = String(used);
                    if (used >= max) castBtn.disabled = true;
                    const countSpan = btn.querySelector('.chip-count');
                    if (countSpan) countSpan.textContent = (max - used) + '/' + max;
                    // Flash feedback
                    castBtn.textContent = 'Cast \u2726';
                    setTimeout(() => { castBtn.textContent = 'Cast'; }, 700);
                    // Persist
                    db.ref('characters/' + charKey + '/abilities/' + a.key).set(used);
                });
                row.appendChild(btn);
                row.appendChild(castBtn);
                rows.appendChild(row);
            });
            abilAccordion.appendChild(rows);

    // --- Spell slot helpers ---

    function getSpellLevel(spell) {
        if (String(spell.level).toLowerCase().startsWith('cantrip')) return 0;
        return parseInt(spell.level) || 1;
    }

    function getSlotLevel(slot) {
        if (/^\d+$/.test(slot.key)) return parseInt(slot.key);
        // Warlock / non-numeric keys: parse from shortLabel e.g. "2nd" → 2
        const m = String(slot.shortLabel || slot.label || '').match(/(\d+)/);
        return m ? parseInt(m[1]) : 1;
    }

    function getSlotsRemaining(slot) {
        let used = 0;
        for (let i = 0; i < slot.count; i++) {
            if (currentSlots[slot.key + '_' + i]) used++;
        }
        return slot.count - used;
    }

    function getAvailableSlotTypes(minLevel) {
        if (!char.spellSlots) return [];
        return char.spellSlots
            .filter(slot => getSlotLevel(slot) >= minLevel && getSlotsRemaining(slot) > 0)
            .sort((a, b) => getSlotLevel(a) - getSlotLevel(b));
    }

    function hasSlotsAvailable() {
        return (char.spellSlots || []).some(slot => getSlotsRemaining(slot) > 0);
    }

    function consumeSlot(slotKey) {
        const slot = (char.spellSlots || []).find(s => s.key === slotKey);
        if (!slot) return false;
        for (let i = 0; i < slot.count; i++) {
            const key = slot.key + '_' + i;
            if (!currentSlots[key]) {
                currentSlots[key] = true;
                db.ref('characters/' + charKey + '/slots/' + key).set(true);
                refreshSpellCastButtons();
                refreshSpellSlotDisplay();
                return true;
            }
        }
        return false;
    }

    let activeCastPopup = null;

    function hideCastPopup() {
        if (activeCastPopup) { activeCastPopup.remove(); activeCastPopup = null; }
    }

    function showCastPopup(anchor, availableSlots, onSelect) {
        hideCastPopup();
        const popup = document.createElement('div');
        popup.className = 'cast-slot-popup';
        availableSlots.forEach(slot => {
            const remaining = getSlotsRemaining(slot);
            const btn = document.createElement('button');
            btn.className = 'cast-slot-option';
            btn.textContent = slot.label + ' \u2014 ' + remaining + ' left';
            btn.addEventListener('click', e => {
                e.stopPropagation();
                hideCastPopup();
                onSelect(slot.key);
            });
            popup.appendChild(btn);
        });
        document.body.appendChild(popup);
        const rect = anchor.getBoundingClientRect();
        popup.style.top = (rect.bottom + 4) + 'px';
        popup.style.left = Math.max(4, rect.right - popup.offsetWidth) + 'px';
        activeCastPopup = popup;
        setTimeout(() => document.addEventListener('click', hideCastPopup, { once: true }), 0);
    }

    function refreshSpellCastButtons() {
        document.querySelectorAll('.spell-cast-btn[data-min-slot-level]').forEach(btn => {
            const minLevel = parseInt(btn.dataset.minSlotLevel) || 1;
            btn.disabled = getAvailableSlotTypes(minLevel).length === 0;
        });
    }

    function buildSpells() {
        const body = document.getElementById('spellsBody');
        if (!body) return;
        body.innerHTML = '';

        if ((!char.spells || char.spells.length === 0) && (!char.spellSlots || char.spellSlots.length === 0)) return;

        const cantrips = (char.spells || []).filter(s => getSpellLevel(s) === 0);
        const levelledSpells = (char.spells || []).filter(s => getSpellLevel(s) > 0);

        // Group levelled spells by their integer level
        const byLevel = {};
        levelledSpells.forEach(s => {
            const lvl = getSpellLevel(s);
            if (!byLevel[lvl]) byLevel[lvl] = { label: s.level, spells: [] };
            byLevel[lvl].spells.push(s);
        });

        const wrapper = document.createElement('div');
        wrapper.className = 'sheet-section-group';
        wrapper.style.marginTop = '10px';

        const header = document.createElement('div');
        header.className = 'section-label';
        header.style.cursor = 'pointer';
        header.style.userSelect = 'none';
        header.innerHTML = '<span>\u2727 Spells</span>';

        const accordionBody = document.createElement('div');
        accordionBody.className = 'accordion-body'; // collapsed by default

        let isOpen = false;
        header.addEventListener('click', () => {
            isOpen = !isOpen;
            accordionBody.classList.toggle('open', isOpen);
        });

        // Cantrips — no slot cost
        if (cantrips.length > 0) {
            const lbl = document.createElement('div');
            lbl.className = 'spell-level-label';
            lbl.style.marginTop = '6px';
            lbl.style.marginBottom = '4px';
            lbl.textContent = 'Cantrips';
            accordionBody.appendChild(lbl);

            const chips = document.createElement('div');
            chips.className = 'ability-chips';
            chips.style.marginBottom = '6px';
            cantrips.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'ability-chip passive spell';
                const baseName = s.name.replace(/\s*\(.*\)$/, '').trim();
                btn.textContent = '\u2727 ' + baseName;
                const desc = SPELL_DESCRIPTIONS[baseName] || '';
                btn.addEventListener('click', () => showAbilityPopup(btn, baseName, desc || 'No description available.'));
                chips.appendChild(btn);
            });
            accordionBody.appendChild(chips);
        }

        // Levelled spells — grouped by level, sorted ascending
        Object.keys(byLevel).sort((a, b) => a - b).forEach(lvl => {
            const { label, spells: spellsAtLevel } = byLevel[lvl];
            const spellLvl = parseInt(lvl);

            const lbl = document.createElement('div');
            lbl.className = 'spell-level-label';
            lbl.style.marginTop = '6px';
            lbl.style.marginBottom = '4px';
            lbl.textContent = label; // e.g. "1st Level"
            accordionBody.appendChild(lbl);

            const rows = document.createElement('div');
            rows.className = 'spell-cast-list';
            spellsAtLevel.forEach(s => {
                const row = document.createElement('div');
                row.className = 'spell-cast-row';

                const nameBtn = document.createElement('button');
                nameBtn.className = 'ability-chip passive spell spell-name-btn';
                const baseName = s.name.replace(/\s*\(.*\)$/, '').trim();
                nameBtn.textContent = '\u2727 ' + baseName;
                const desc = SPELL_DESCRIPTIONS[baseName] || '';
                nameBtn.addEventListener('click', () => showAbilityPopup(nameBtn, baseName, desc || 'No description available.'));

                const castBtn = document.createElement('button');
                castBtn.className = 'spell-cast-btn';
                castBtn.dataset.minSlotLevel = spellLvl;
                castBtn.textContent = 'Cast';
                castBtn.disabled = getAvailableSlotTypes(spellLvl).length === 0;

                castBtn.addEventListener('click', () => {
                    const available = getAvailableSlotTypes(spellLvl);
                    if (available.length === 0) return;
                    const docast = key => {
                        consumeSlot(key);
                        castBtn.textContent = 'Cast \u2726';
                        setTimeout(() => { castBtn.textContent = 'Cast'; }, 700);
                    };
                    if (available.length === 1) {
                        docast(available[0].key);
                    } else {
                        showCastPopup(castBtn, available, docast);
                    }
                });

                row.appendChild(nameBtn);
                row.appendChild(castBtn);
                rows.appendChild(row);
            });
            accordionBody.appendChild(rows);
        });

        // Spell slot display
        if (char.spellSlots && char.spellSlots.length > 0) {
            const slotLbl = document.createElement('div');
            slotLbl.className = 'spell-level-label';
            slotLbl.style.marginTop = '10px';
            slotLbl.style.marginBottom = '6px';
            slotLbl.textContent = 'Spell Slots';
            accordionBody.appendChild(slotLbl);

            const slotDisplay = document.createElement('div');
            slotDisplay.id = 'spellSlotDisplay';
            accordionBody.appendChild(slotDisplay);
        }

        wrapper.appendChild(header);
        wrapper.appendChild(accordionBody);
        body.appendChild(wrapper);

        refreshSpellSlotDisplay();
    }

    function refreshSpellSlotDisplay() {
        const display = document.getElementById('spellSlotDisplay');
        if (!display || !char.spellSlots) return;
        display.innerHTML = '';
        char.spellSlots.forEach(slot => {
            const row = document.createElement('div');
            row.className = 'slot-row';
            row.style.marginBottom = '10px';

            const lbl = document.createElement('span');
            lbl.className = 'slot-level-label';
            lbl.textContent = slot.shortLabel || slot.label;
            row.appendChild(lbl);

            const pips = document.createElement('div');
            pips.className = 'slot-pips';
            for (let i = 0; i < slot.count; i++) {
                const slotKey = slot.key + '_' + i;
                const pip = document.createElement('div');
                pip.className = 'slot-pip';
                if (currentSlots[slotKey]) pip.classList.add('spent');
                pip.title = 'Click to toggle';
                pip.addEventListener('click', () => {
                    const spent = !pip.classList.contains('spent');
                    currentSlots[slotKey] = spent;
                    db.ref('characters/' + charKey + '/slots/' + slotKey).set(spent);
                    refreshSpellCastButtons();
                    refreshSpellSlotDisplay();
                });
                pips.appendChild(pip);
            }
            row.appendChild(pips);
            display.appendChild(row);
        });
    }

    function getSkillValue(skill) {
        const base = char.stats[skill.stat] || 0;
        const profBonus = proficiencyFromLevel(char.level || 1);
        return fmtMod(base + (skillProficiencies.includes(skill.name) ? profBonus : 0));
    }

    function buildSkills() {
        const body = document.getElementById('skillsBody');
        if (!body) return;
        body.innerHTML = '';

        const wrapper = document.createElement('div');
        wrapper.className = 'sheet-section-group';
        wrapper.style.marginTop = '10px';

        const header = document.createElement('div');
        header.className = 'section-label';
        header.style.cursor = 'pointer';
        header.style.userSelect = 'none';
        header.innerHTML = '<span>\u25C8 Skills</span>';

        const accordionBody = document.createElement('div');
        accordionBody.className = 'accordion-body';
        accordionBody.id = 'skillsAccordion';

        let isOpen = false;
        header.addEventListener('click', () => {
            isOpen = !isOpen;
            accordionBody.classList.toggle('open', isOpen);
        });

        SKILLS.forEach(skill => {
            const row = document.createElement('div');
            row.className = 'save-row';

            const profBtn = document.createElement('button');
            profBtn.className = 'save-prof-btn';
            profBtn.dataset.skill = skill.name;
            profBtn.innerHTML = '\u25C6';
            profBtn.addEventListener('click', () => toggleSkillProficiency(skill.name));

            const statEl = document.createElement('span');
            statEl.className = 'save-stat';
            statEl.textContent = skill.stat;

            const valueEl = document.createElement('span');
            valueEl.className = 'save-value';
            valueEl.id = 'skill-value-' + skill.name.replace(/\s/g, '-');
            valueEl.textContent = getSkillValue(skill);

            const nameEl = document.createElement('span');
            nameEl.className = 'save-name';
            nameEl.textContent = skill.name;

            row.appendChild(profBtn);
            row.appendChild(statEl);
            row.appendChild(valueEl);
            row.appendChild(nameEl);
            accordionBody.appendChild(row);
        });

        wrapper.appendChild(header);
        wrapper.appendChild(accordionBody);
        body.appendChild(wrapper);

        refreshSkills();
    }

    function toggleSkillProficiency(skillName) {
        const idx = skillProficiencies.indexOf(skillName);
        if (idx !== -1) {
            skillProficiencies = skillProficiencies.filter(s => s !== skillName);
        } else {
            if (skillProficiencies.length >= 4) return;
            skillProficiencies = [...skillProficiencies, skillName];
        }
        db.ref('characters/' + charKey + '/skillProficiencies').set(skillProficiencies.length > 0 ? skillProficiencies : null);
        refreshSkills();
    }

    function refreshSkills() {
        SKILLS.forEach(skill => {
            const valueEl = document.getElementById('skill-value-' + skill.name.replace(/\s/g, '-'));
            if (valueEl) valueEl.textContent = getSkillValue(skill);

            const profBtn = document.querySelector('.save-prof-btn[data-skill="' + skill.name + '"]');
            if (!profBtn) return;
            const isProficient = skillProficiencies.includes(skill.name);
            const isMaxed = skillProficiencies.length >= 4 && !isProficient;
            profBtn.classList.toggle('active', isProficient);
            profBtn.disabled = isMaxed;
            profBtn.title = 'Toggle skill proficiency (' + skillProficiencies.length + '/4 used)';
        });
    }
