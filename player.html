        minusBtn.className = 'inv-amt-btn';
        minusBtn.textContent = '\u2212';

        const valEl = document.createElement('span');
        valEl.className = 'gold-value';
        valEl.id = 'goldValue';
        valEl.textContent = currentGold;

        // Show pending gold delta if any
        const pendingEntries = Object.values(pendingGoldRequests);
        if (pendingEntries.length) {
            const totalPending = pendingEntries.reduce((s, r) => s + r.delta, 0);
            const sign = totalPending >= 0 ? '+' : '';
            const pendEl = document.createElement('span');
            pendEl.className = 'inv-delta';
            pendEl.textContent = ' (' + sign + totalPending + ')';
            valEl.appendChild(pendEl);
        }

        const plusBtn = document.createElement('button');
        plusBtn.className = 'inv-amt-btn';
        plusBtn.textContent = '+';

        // Inline input row
        const inputRow = document.createElement('div');
        inputRow.className = 'gold-input-row';
        inputRow.style.display = 'none';

        const amtInput = document.createElement('input');
        amtInput.type = 'number';
        amtInput.className = 'gold-amt-input';
        amtInput.min = '1';
        amtInput.max = '99999';
        amtInput.placeholder = 'Amount...';

        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'gold-confirm-btn';
        confirmBtn.textContent = '\u2714';

        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'gold-cancel-btn';
        cancelBtn.textContent = '\u00D7';

        inputRow.appendChild(amtInput);
        inputRow.appendChild(confirmBtn);
        inputRow.appendChild(cancelBtn);

        let pendingSign = 1;

        function showInput(sign) {
            pendingSign = sign;
            amtInput.value = '';
            inputRow.style.display = 'flex';
            amtInput.focus();
        }

        function hideInput() {
            inputRow.style.display = 'none';
        }

        function submitGold() {
            const amt = Math.max(1, parseInt(amtInput.value) || 0);
            if (!amt) return;
            requestGoldChange(pendingSign * amt);
            hideInput();
        }

        minusBtn.onclick = () => showInput(-1);
        plusBtn.onclick = () => showInput(+1);
        confirmBtn.onclick = submitGold;
        cancelBtn.onclick = hideInput;
        amtInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') submitGold();
            if (e.key === 'Escape') hideInput();
        });

        row.appendChild(label);
        row.appendChild(minusBtn);
        row.appendChild(valEl);
        row.appendChild(plusBtn);
        el.appendChild(row);
        el.appendChild(inputRow);
    }

    function requestGoldChange(delta) {
        db.ref('goldRequests/' + charKey).push({
            charKey,
            charName: char.name,
            currentGold,
            delta,
            timestamp: Date.now(),
        });
    }

    function setTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    }

    // =========================================================
    // PIXEL ART DICE SYSTEM
    // =========================================================
    const PX = 2;
    const C = {
        outline: '#5a5040', outlineDim: '#4a4030', face: '#0d0b08', faceLight: '#12100c',
        dot: '#c4a44e', dotDim: '#6a5e48', text: '#c4a44e', textDim: '#6a5e48',
    };
    const CI = {
        outline: '#090c10', outlineDim: '#6a5030', face: '#c4a44e', faceLight: '#b89840',
        dot: '#090c10', dotDim: '#5a4020', text: '#090c10', textDim: '#5a4020',
    };

    function px(ctx, x, y, color) { ctx.fillStyle = color; ctx.fillRect(x * PX, y * PX, PX, PX); }

    function drawD4(ctx, frame, rolled, value, inv) {
        const p = inv ? CI : C; const f = frame % 4;
        const oc = rolled ? p.outline : p.outlineDim, fc = p.face, tc = rolled ? p.text : p.textDim;
        ctx.clearRect(0, 0, 32, 32);
        const offY = [0, -1, 0, 1][f];
        for (let row = 0; row < 10; row++) {
            const half = Math.floor(row * 0.7);
            for (let col = 7 - half; col <= 8 + half; col++) px(ctx, col, 4 + row + offY, fc);
        }
        for (let row = 0; row < 10; row++) {
            const half = Math.floor(row * 0.7);
            px(ctx, 7 - half, 4 + row + offY, oc); px(ctx, 8 + half, 4 + row + offY, oc);
        }
        for (let col = 1; col <= 14; col++) px(ctx, col, 13 + offY, oc);
        if (rolled && value != null) drawPixelNum(ctx, value, 7, 8 + offY, tc);
    }

    function drawD6(ctx, frame, rolled, value, inv) {
        const p = inv ? CI : C; const f = frame % 4;
        const oc = rolled ? p.outline : p.outlineDim, fc = p.face, dc = rolled ? p.dot : p.dotDim;
        ctx.clearRect(0, 0, 32, 32);
        const offX = [0, 1, 0, -1][f];
        for (let y = 3; y <= 13; y++) for (let x = 3; x <= 13; x++) px(ctx, x + offX, y, fc);
        for (let i = 3; i <= 13; i++) {
            px(ctx, i + offX, 3, oc); px(ctx, i + offX, 13, oc);
            px(ctx, 3 + offX, i, oc); px(ctx, 13 + offX, i, oc);
        }
        if (rolled && value != null) { drawPixelNum(ctx, value, 7 + offX, 7, dc); }
        else { const dots = [[5,5],[8,8],[11,11],[5,11],[11,5],[8,5]][f % 3]; px(ctx, dots[0] + offX, dots[1], dc); }
    }

    function drawD8(ctx, frame, rolled, value, inv) {
        const p = inv ? CI : C; const f = frame % 4;
        const oc = rolled ? p.outline : p.outlineDim, fc = p.face, tc = rolled ? p.text : p.textDim;
        ctx.clearRect(0, 0, 32, 32);
        const rot = [0, 1, 0, -1][f];
        for (let row = 0; row < 12; row++) {
            const half = row < 6 ? row : 11 - row;
            for (let col = 7 - half; col <= 8 + half; col++) px(ctx, col + rot, 2 + row, fc);
            px(ctx, 7 - half + rot, 2 + row, oc); px(ctx, 8 + half + rot, 2 + row, oc);
        }
        if (rolled && value != null) drawPixelNum(ctx, value, 7 + rot, 7, tc);
    }

    function drawD10(ctx, frame, rolled, value, inv) {
        const p = inv ? CI : C; const f = frame % 4;
        const oc = rolled ? p.outline : p.outlineDim, fc = p.face, tc = rolled ? p.text : p.textDim;
        ctx.clearRect(0, 0, 32, 32);
        const offY = [0, -1, 0, 1][f];
        for (let row = 0; row < 13; row++) {
            const half = row < 5 ? row : Math.max(0, Math.floor((12 - row) * 1.2));
            for (let col = 7 - half; col <= 8 + half; col++) px(ctx, col, 2 + row + offY, fc);
            px(ctx, 7 - half, 2 + row + offY, oc); px(ctx, 8 + half, 2 + row + offY, oc);
        }
        if (rolled && value != null) drawPixelNum(ctx, value, 7, 7 + offY, tc);
    }

    function drawD12(ctx, frame, rolled, value, inv) {
        const p = inv ? CI : C; const f = frame % 4;
        const oc = rolled ? p.outline : p.outlineDim, fc = p.face, tc = rolled ? p.text : p.textDim;
        ctx.clearRect(0, 0, 32, 32);
        const rot = [0, 1, 0, -1][f];
        const shape = [[7,8],[5,10],[4,11],[3,12],[2,13],[2,13],[2,13],[2,13],[3,12],[4,11],[4,11],[4,11]];
        shape.forEach(([l, r], i) => {
            const y = 2 + i, isFlat = i === 0 || i === shape.length - 1;
            for (let x = l; x <= r; x++) px(ctx, x + rot, y, (isFlat || x === l || x === r) ? oc : fc);
        });
        if (rolled && value != null) drawPixelNum(ctx, value, 7 + rot, 7, tc);
    }

    function drawD20(ctx, frame, rolled, value, inv) {
        const p = inv ? CI : C; const f = frame % 4;
        const oc = rolled ? p.outline : p.outlineDim, fc = p.face, tc = rolled ? p.text : p.textDim, hc = p.faceLight;
        ctx.clearRect(0, 0, 32, 32);
        const offY = [0, -1, 0, 1][f];
        const shape = [[5,10],[3,12],[2,13],[2,13],[2,13],[2,13],[2,13],[2,13],[2,13],[2,13],[3,12],[5,10]];
        shape.forEach(([l, r], i) => {
            const y = 2 + i + offY, isFlat = i === 0 || i === shape.length - 1;
            for (let x = l; x <= r; x++)
                px(ctx, x, y, (isFlat || x === l || x === r) ? oc : (i < 5 ? hc : fc));
        });
        if (rolled && value != null) drawPixelNum(ctx, value, 7, 7 + offY, tc);
    }

    function drawD100(ctx, frame, rolled, value, inv) {
        const p = inv ? CI : C; const f = frame % 4;
        const oc = rolled ? p.outline : p.outlineDim, fc = p.face, tc = rolled ? p.text : p.textDim;
        ctx.clearRect(0, 0, 32, 32);
        const offX = [0, 1, 0, -1][f];
        const cx1 = 6 + offX, cy1 = 8, cx2 = 10 + offX, cy2 = 8, r = 5;
        for (let y = 1; y <= 15; y++) for (let x = 1; x <= 15; x++) {
            const d1 = Math.sqrt((x-cx1)**2+(y-cy1)**2), d2 = Math.sqrt((x-cx2)**2+(y-cy2)**2);
            if (d1 <= r || d2 <= r) {
                if (Math.abs(d1-r) < 1.0 || Math.abs(d2-r) < 1.0) px(ctx, x, y, oc);
                else px(ctx, x, y, fc);
            }
        }
        if (rolled && value != null) drawPixelNum(ctx, value, 8 + offX, 8, tc);
    }

    const DIGITS = {
        0:[0b111,0b101,0b101,0b101,0b111], 1:[0b010,0b110,0b010,0b010,0b111],
        2:[0b111,0b001,0b111,0b100,0b111], 3:[0b111,0b001,0b111,0b001,0b111],
        4:[0b101,0b101,0b111,0b001,0b001], 5:[0b111,0b100,0b111,0b001,0b111],
        6:[0b111,0b100,0b111,0b101,0b111], 7:[0b111,0b001,0b010,0b010,0b010],
        8:[0b111,0b101,0b111,0b101,0b111], 9:[0b111,0b101,0b111,0b001,0b111],
    };

    function drawPixelNum(ctx, num, cx, cy, color) {
        const s = String(num); const totalW = s.length * 4 - 1;
        let startX = cx - Math.floor(totalW / 2);
        for (let d = 0; d < s.length; d++) {
            const glyph = DIGITS[s[d]]; if (!glyph) continue;
            for (let row = 0; row < 5; row++) for (let col = 0; col < 3; col++)
                if (glyph[row] & (1 << (2 - col))) px(ctx, startX + col, cy - 2 + row, color);
            startX += 4;
        }
    }

    const drawFns = { 4: drawD4, 6: drawD6, 8: drawD8, 10: drawD10, 12: drawD12, 20: drawD20, 100: drawD100 };
    function drawDie(ctx, sides, frame, rolled, value, inv) { (drawFns[sides] || drawD6)(ctx, frame, rolled, value, inv); }

    const FPS = 4;
    let globalFrame = 0;
    let animCanvases = [];

    function registerAnim(canvas, sides, getRolled, getValue, getInv) {
        animCanvases.push({ canvas, sides, getRolled, getValue, getInv: getInv || (() => false) });
    }
    function unregisterAnim(canvas) { animCanvases = animCanvases.filter(a => a.canvas !== canvas); }

    setInterval(() => {
        globalFrame++;
        animCanvases.forEach(a => {
            const ctx = a.canvas.getContext('2d');
            const rolled = a.getRolled(), val = a.getValue(), inv = a.getInv();
            drawDie(ctx, a.sides, rolled ? 0 : globalFrame, rolled, val, inv);
        });
    }, 1000 / FPS);

    // Touch drag state
    let touchDragSides = null;
    let touchDragGhost = null;

    function initDiceStrip() {
        // Desktop drop zones
        ['atkSurface', 'dmgSurface'].forEach(id => {
            const surface = document.getElementById(id);
            const zoneId = id === 'atkSurface' ? 'atk' : 'dmg';
            surface.addEventListener('dragover', e => { e.preventDefault(); surface.classList.add('drag-over'); });
            surface.addEventListener('dragleave', () => surface.classList.remove('drag-over'));
            surface.addEventListener('drop', e => {
                e.preventDefault();
                surface.classList.remove('drag-over');
                const sides = parseInt(e.dataTransfer.getData('text/plain'));
                if (sides) addDiceChip(sides, zoneId);
            });
        });

        document.querySelectorAll('.die-sym').forEach(die => {
            const sides = parseInt(die.dataset.sides);
            const c = document.createElement('canvas');
            c.width = 32; c.height = 32;
            c.style.width = '42px'; c.style.height = '42px';
            die.appendChild(c);

            const label = document.createElement('span');
            label.className = 'die-label';
            label.textContent = 'd' + sides;
            die.appendChild(label);

            let hovering = false;
            die.addEventListener('mouseenter', () => { hovering = true; });
            die.addEventListener('mouseleave', () => { hovering = false; });
            registerAnim(c, sides, () => false, () => null, () => hovering);

            // Desktop drag
            die.draggable = true;
            die.addEventListener('dragstart', e => {
                die.classList.add('dragging');
                e.dataTransfer.setData('text/plain', String(sides));
            });
            die.addEventListener('dragend', () => die.classList.remove('dragging'));

            // Mobile touch drag
            die.addEventListener('touchstart', e => {
                e.preventDefault();
                touchDragSides = sides;
                touchDragGhost = document.createElement('div');
                touchDragGhost.className = 'die-drag-ghost';
                touchDragGhost.textContent = 'd' + sides;
                document.body.appendChild(touchDragGhost);
                const t = e.touches[0];
                touchDragGhost.style.left = (t.clientX - 28) + 'px';
                touchDragGhost.style.top  = (t.clientY - 28) + 'px';
                document.querySelectorAll('.player-dice-surface').forEach(s => s.classList.add('drag-ready'));
            }, { passive: false });

            die.addEventListener('touchmove', e => {
                e.preventDefault();
                if (!touchDragGhost) return;
                const t = e.touches[0];
                touchDragGhost.style.left = (t.clientX - 28) + 'px';
                touchDragGhost.style.top  = (t.clientY - 28) + 'px';
                document.querySelectorAll('.player-dice-surface').forEach(s => {
                    const r = s.getBoundingClientRect();
                    const over = t.clientX >= r.left && t.clientX <= r.right &&
                                 t.clientY >= r.top  && t.clientY <= r.bottom;
                    s.classList.toggle('drag-over', over);
                });
            }, { passive: false });

            die.addEventListener('touchend', e => {
                document.querySelectorAll('.player-dice-surface').forEach(s => {
                    s.classList.remove('drag-over');
                    s.classList.remove('drag-ready');
                });
                if (!touchDragGhost) return;
                const t = e.changedTouches[0];
                touchDragGhost.style.display = 'none';
                const el = document.elementFromPoint(t.clientX, t.clientY);
                touchDragGhost.remove();
                touchDragGhost = null;
                if (el) {
                    const surface = el.closest('.player-dice-surface');
                    if (surface) {
                        const zoneId = surface.id === 'atkSurface' ? 'atk' : 'dmg';
                        addDiceChip(touchDragSides, zoneId);
                    }
                }
                touchDragSides = null;
            });
        });
    }

    function addDiceChip(sides, zoneId) {
        const surface = document.getElementById(zoneId === 'atk' ? 'atkSurface' : 'dmgSurface');
        document.getElementById(zoneId === 'atk' ? 'atkHint' : 'dmgHint').style.display = 'none';

        const chip = document.createElement('div');
        chip.className = 'dice-chip';
        chip.dataset.sides = sides;
        chip.dataset.rolled = 'false';
        chip.dataset.value = '';

        const c = document.createElement('canvas');
        c.className = 'chip-pixel-die';
        c.width = 32; c.height = 32;
        c.style.width = '32px'; c.style.height = '32px';
        chip.appendChild(c);

        registerAnim(c, sides,
            () => chip.dataset.rolled === 'true',
            () => chip.dataset.value ? parseInt(chip.dataset.value) : null,
            () => chip.dataset.rolled === 'true'
        );

        const resultSpan = document.createElement('span');
        resultSpan.className = 'chip-result';
        resultSpan.textContent = 'd' + sides;
        chip.appendChild(resultSpan);

        const removeSpan = document.createElement('span');
        removeSpan.className = 'chip-remove';
        removeSpan.innerHTML = '&times;';
        removeSpan.onclick = e => {
            e.stopPropagation();
            unregisterAnim(c);
            chip.remove();
            updateRollBtn(zoneId);
            checkZoneEmpty(zoneId);
        };
        chip.appendChild(removeSpan);

        surface.appendChild(chip);
        updateRollBtn(zoneId);
    }

    function checkZoneEmpty(zoneId) {
        const chips = document.getElementById(zoneId === 'atk' ? 'atkSurface' : 'dmgSurface').querySelectorAll('.dice-chip');
        document.getElementById(zoneId === 'atk' ? 'atkHint' : 'dmgHint').style.display = chips.length === 0 ? 'flex' : 'none';
    }

    function updateRollBtn(zoneId) {
        const unrolled = document.getElementById(zoneId === 'atk' ? 'atkSurface' : 'dmgSurface')
                                 .querySelectorAll('.dice-chip[data-rolled="false"]');
        document.getElementById(zoneId === 'atk' ? 'atkRollBtn' : 'dmgRollBtn').disabled = unrolled.length === 0;
    }

    function clearDiceZone(zoneId) {
        const surface = document.getElementById(zoneId === 'atk' ? 'atkSurface' : 'dmgSurface');
        surface.querySelectorAll('.dice-chip canvas').forEach(c => unregisterAnim(c));
        surface.querySelectorAll('.dice-chip').forEach(c => c.remove());
        checkZoneEmpty(zoneId);
        updateRollBtn(zoneId);
        document.getElementById(zoneId === 'atk' ? 'atkResultBar' : 'dmgResultBar').style.display = 'none';
    }

    // =========================================================
    // ROLLING
    // =========================================================
    function rollZone(zoneId) {
        const surface = document.getElementById(zoneId === 'atk' ? 'atkSurface' : 'dmgSurface');
        const unrolled = [...surface.querySelectorAll('.dice-chip[data-rolled="false"]')];
        if (unrolled.length === 0) return;

        const tickRate = 1000 / FPS;
        let elapsed = 0;
        const interval = setInterval(() => {
            elapsed += tickRate;
            unrolled.forEach(chip => {
                chip.dataset.value = Math.floor(Math.random() * parseInt(chip.dataset.sides)) + 1;
                chip.querySelector('.chip-result').textContent = chip.dataset.value;
            });
            if (elapsed >= 600) {
                clearInterval(interval);
                const rolls = [];
                unrolled.forEach(chip => {
                    const sides = parseInt(chip.dataset.sides);
                    const result = Math.floor(Math.random() * sides) + 1;
                    chip.dataset.rolled = 'true';
                    chip.dataset.value = result;
                    chip.classList.add('rolled');
                    chip.querySelector('.chip-result').textContent = result;
                    rolls.push({ sides, result });
                });
                updateRollBtn(zoneId);
                showResults(rolls, zoneId);
            }
        }, tickRate);
    }

    function showResults(rolls, zoneId) {
        const totalId    = zoneId === 'atk' ? 'atkResultTotal'    : 'dmgResultTotal';
        const breakdownId= zoneId === 'atk' ? 'atkResultBreakdown': 'dmgResultBreakdown';
        const barId      = zoneId === 'atk' ? 'atkResultBar'      : 'dmgResultBar';
        const typeLabel  = zoneId === 'atk' ? 'Event 1' : 'Event 2';

        const total  = rolls.reduce((s, r) => s + r.result, 0);
        const isCrit = zoneId === 'atk' && rolls.length === 1 && rolls[0].sides === 20 && rolls[0].result === 20;
        const isFail = zoneId === 'atk' && rolls.length === 1 && rolls[0].sides === 20 && rolls[0].result === 1;

        const totalEl = document.getElementById(totalId);
        totalEl.textContent = total;
        totalEl.className = 'dice-result-total' + (isCrit ? ' crit' : isFail ? ' fail' : '');

        const breakdown = rolls.map(r => `d${r.sides}:${r.result}`).join('  ');
        document.getElementById(breakdownId).textContent =
            rolls.length > 1 ? breakdown + '  =  ' + total
                             : (isCrit ? 'Critical Hit!' : isFail ? 'Critical Fail' : breakdown);
        document.getElementById(barId).style.display = 'flex';

        const historyLabel = rolls.map(r => `d${r.sides}`).join('+');
        const suffix = isCrit ? ' CRIT!' : isFail ? ' FAIL' : '';
        rollHistory.unshift({ type: typeLabel, label: historyLabel, total, isTotalCrit: isCrit, isTotalFail: isFail, suffix });
        if (rollHistory.length > 8) rollHistory.pop();
        renderRollHistory();

        db.ref('diceLog').push({
            character: char.name,
            charKey,
            dice:      historyLabel,
            result:    total,
            type:      typeLabel,
            timestamp: Date.now(),
        });
    }

    // =========================================================
    // FIREBASE SYNC
    // =========================================================
    function startFirebaseSync() {
        const charRef = db.ref('characters/' + charKey);

        // Initialise HP if this character has never connected before
        charRef.child('hp').once('value', snap => {
            if (snap.val() === null) {
                charRef.update({ hp: char.maxHp, maxHp: char.maxHp });
            }
        });

        // Live HP updates
        charRef.child('hp').on('value', snap => {
            const hp = snap.val();
            if (hp !== null) updateHpDisplay(hp);
        });

        // Live inventory updates
        charRef.child('inventory').on('value', snap => {
            renderInventory(snap.val() || {});
        });
        db.ref('inventoryRequests/' + charKey).on('value', snap => {
            pendingRequests = snap.val() || {};
            charRef.child('inventory').once('value', invSnap => {
                renderInventory(invSnap.val() || {});
            });
        });

        // Initialise spell slots in Firebase if not set
        if (char.spellSlots.length > 0) {
            charRef.child('slots').once('value', snap => {
                if (!snap.val()) {
                    const defaults = {};
                    char.spellSlots.forEach(s => {
                        for (let i = 0; i < s.count; i++) defaults[s.key + '_' + i] = false;
                    });
                    charRef.child('slots').set(defaults);
                }
            });
        }

        // Initialise abilities in Firebase if not set
        const activeAbils = char.abilities.filter(a => !a.passive && a.key);
        if (activeAbils.length > 0) {
            charRef.child('abilities').once('value', snap => {
                if (!snap.val()) {
                    const defaults = {};
                    activeAbils.forEach(a => { defaults[a.key] = 0; });
                    charRef.child('abilities').set(defaults);
                }
            });
        }

        // Live slot updates (DM or rest changes sync here)
        charRef.child('slots').on('value', snap => {
            currentSlots = snap.val() || {};
            // Update buildSpecial() pips (they use data-slot-key)
            Object.entries(currentSlots).forEach(([key, spent]) => {
                document.querySelectorAll('[data-slot-key="' + key + '"]').forEach(pip => {
                    pip.classList.toggle('spent', spent);
                });
            });
            refreshSpellCastButtons();
            refreshSpellSlotDisplay();
        });

        // Live ability updates
        charRef.child('abilities').on('value', snap => {
            const abilities = snap.val() || {};
            Object.entries(abilities).forEach(([key, used]) => {
                document.querySelectorAll('[data-ability-key="' + key + '"]').forEach(el => {
                    const max = parseInt(el.dataset.abilityMax || '0');
                    if (max) {
                        el.dataset.currentUsed = String(used);
                        el.classList.toggle('used', used >= max);
                        if (el.classList.contains('spell-cast-btn')) {
                            el.disabled = used >= max;
                        }
                    }
                    const count = el.querySelector('.chip-count');
                    if (count && max) count.textContent = (max - used) + '/' + max;
                });
            });
        });

        // Live conditions sync
        charRef.child('conditions').on('value', snap => {
            const conds = snap.val() || {};
            activeConditions = {};
            Object.entries(conds).forEach(([key, val]) => {
                if (val) activeConditions[key.replace(/_/g, ' ')] = true;
            });
            CONDITIONS.forEach(cond => {
                const input = document.querySelector('[data-cond="' + cond.name + '"]');
                if (input) input.checked = !!activeConditions[cond.name];
            });
            updateActiveConditionsDisplay();
        });

        // Live saving throw proficiencies sync
        charRef.child('saveProficiencies').on('value', snap => {
            saveProficiencies = snap.val() || [];
            refreshSavingThrows();
        });

        // Live skill proficiencies sync
        charRef.child('skillProficiencies').on('value', snap => {
            skillProficiencies = snap.val() || [];
            refreshSkills();
        });

        // Live gold sync
        charRef.child('gold').on('value', snap => {
            currentGold = snap.val() || 0;
            renderGold();
        });

        // Gold requests (pending DM approval)
        db.ref('goldRequests/' + charKey).on('value', snap => {
            pendingGoldRequests = snap.val() || {};
            renderGold();
        });

        // Notes — debounced save, don't overwrite while actively typing
        let notesDebounce = null;
        const notesTextarea = document.getElementById('notesTextarea');
        if (notesTextarea) {
            notesTextarea.addEventListener('input', () => {
                clearTimeout(notesDebounce);
                notesDebounce = setTimeout(() => {
                    db.ref('characters/' + charKey + '/notes').set(notesTextarea.value || null);
                }, 800);
            });
        }
        charRef.child('notes').on('value', snap => {
            const notes = snap.val() || '';
            if (notesTextarea && document.activeElement !== notesTextarea) {
                notesTextarea.value = notes;
            }
        });
    }

    function initNotesPanel() {
        const header = document.getElementById('notesHeader');
        if (!header) return;
        let open = false;
        header.addEventListener('click', () => {
            open = !open;
            document.getElementById('notesBody').style.display = open ? 'block' : 'none';
            const arrow = document.getElementById('notesArrow');
            if (arrow) arrow.style.transform = open ? 'rotate(180deg)' : '';
        });
    }

    // =========================================================
    // HP
    // =========================================================
    function updateHpDisplay(hp) {
        currentHp = hp;
        const pct = Math.max(0, hp / char.maxHp);
        const hpEl      = document.getElementById('hpCurrent');
        const barEl     = document.getElementById('hpBar');
        const counterEl = document.getElementById('hpCounter');
        const suffix    = pct <= 0.25 ? ' low' : pct <= 0.5 ? ' mid' : '';

        hpEl.textContent = hp;
        document.getElementById('hpMaxLabel').textContent = char.maxHp;
        barEl.style.width = (pct * 100) + '%';
        barEl.className = 'hp-bar-fill' + suffix;
        counterEl.className = 'hp-counter' + suffix;
    }

    function changeHp(delta) {
        if (currentHp === null) return;
        db.ref('characters/' + charKey + '/hp').transaction(hp => {
            const cur = hp !== null ? hp : char.maxHp;
            return Math.max(0, Math.min(char.maxHp, cur + delta));
        });
    }

    // =========================================================
    // INVENTORY
    // =========================================================
    const INV_CATEGORIES = [
        { key: 'armour',      label: '\u26E8 Armour',      hasStats: true },
        { key: 'weapons',     label: '\u2694 Weapons',     hasStats: true },
        { key: 'tools',       label: '\u2692 Tools' },
        { key: 'loot',        label: '\u25C6 Loot' },
        { key: 'consumables', label: '\u25CF Consumables' },
        { key: 'other',       label: '\u25CB Other' },
    ];

    function renderInventory(items) {
        const list = document.getElementById('invList');
        list.innerHTML = '';
        const keys = Object.keys(items);
        if (keys.length === 0) {
            list.innerHTML = '<div class="inv-empty">\u2694 Your pack is empty \u2694</div>';
            return;
        }

        // Normalise legacy string items
        const normalized = {};
        keys.forEach(k => {
            const v = items[k];
            normalized[k] = typeof v === 'string' ? { name: v, amount: 1, category: 'other' } : v;
        });

        // Map itemKey -> pending request
        const pendingByItem = {};
        Object.entries(pendingRequests).forEach(([reqKey, req]) => {
            pendingByItem[req.itemKey] = { reqKey, delta: req.delta, currentAmount: req.currentAmount };
        });

        let anyRendered = false;
        INV_CATEGORIES.forEach(cat => {
            const catItems = Object.entries(normalized).filter(([, v]) => (v.category || 'other') === cat.key);
            if (!catItems.length) return;
            anyRendered = true;

            // Accordion section
            const section = document.createElement('div');
            section.className = 'inv-cat-section';

            const header = document.createElement('div');
            header.className = 'inv-cat-header accordion-style';
            const headerLabel = document.createElement('span');
            headerLabel.textContent = cat.label;
            const arrow = document.createElement('span');
            arrow.className = 'inv-cat-arrow';
            arrow.textContent = '\u25B8'; // right triangle
            header.appendChild(headerLabel);
            header.appendChild(arrow);
            header.onclick = () => {
                section.classList.toggle('open');
                arrow.textContent = section.classList.contains('open') ? '\u25BE' : '\u25B8';
            };
            section.appendChild(header);

            const body = document.createElement('div');
            body.className = 'inv-cat-body';
            section.appendChild(body);

            catItems.forEach(([key, item]) => {
                const pending = pendingByItem[key];
                const row = document.createElement('div');
                row.className = 'inv-item';

                const nameWrap = document.createElement('div');
                nameWrap.className = 'inv-item-wrap';

                const nameRow = document.createElement('div');
                nameRow.className = 'inv-name-row';

                const nameEl = document.createElement('span');
                nameEl.className = 'inv-item-name' + (pending ? ' inv-pending' : '');

                if (pending) {
                    const sign = pending.delta >= 0 ? '+' : '';
                    nameEl.innerHTML = '(' + item.amount + ') ' + escapeHtml(item.name || '') +
                        ' <span class="inv-delta">(' + sign + pending.delta + ')</span>';
                } else {
                    nameEl.textContent = item.name;
                }
                nameRow.appendChild(nameEl);

                if (cat.hasStats) {
                    let badgeText = '';
                    if (item.category === 'weapons' && item.damageDice) {
                        badgeText = item.damageDice + ' ' + (item.damageType || '');
                    } else if (item.category === 'armour' && item.ac != null) {
                        badgeText = 'AC ' + item.ac;
                    } else if (item.stats) {
                        badgeText = item.stats; // legacy fallback
                    }
                    if (badgeText) {
                        const badge = document.createElement('span');
                        badge.className = 'inv-stat-badge';
                        badge.textContent = badgeText;
                        nameRow.appendChild(badge);
                    }
                }
                nameWrap.appendChild(nameRow);

                if (cat.hasStats && item.notes) {
                    const notesEl = document.createElement('div');
                    notesEl.className = 'inv-item-notes';
                    notesEl.textContent = item.notes;
                    nameWrap.appendChild(notesEl);
                }

                row.appendChild(nameWrap);

                if (!pending) {
                    const amtGroup = document.createElement('div');
                    amtGroup.className = 'inv-amount-group';
                    const amtDisplay = document.createElement('span');
                    amtDisplay.className = 'inv-amt-display';
                    amtDisplay.textContent = item.amount;
                    const deltaInput = document.createElement('input');
                    deltaInput.type = 'number';
                    deltaInput.className = 'inv-delta-input';
                    deltaInput.value = '1';
                    deltaInput.min = '1';
                    deltaInput.max = '9999';
                    const minusBtn = document.createElement('button');
                    minusBtn.className = 'inv-amt-btn';
                    minusBtn.textContent = '\u2212';
                    minusBtn.onclick = () => adjustAmount(key, item.name, item.amount, -(Math.max(1, parseInt(deltaInput.value) || 1)));
                    const plusBtn = document.createElement('button');
                    plusBtn.className = 'inv-amt-btn';
                    plusBtn.textContent = '+';
                    plusBtn.onclick = () => adjustAmount(key, item.name, item.amount, Math.max(1, parseInt(deltaInput.value) || 1));
                    amtGroup.appendChild(amtDisplay);
                    amtGroup.appendChild(minusBtn);
                    amtGroup.appendChild(deltaInput);
                    amtGroup.appendChild(plusBtn);
                    row.appendChild(amtGroup);
                }

                const removeBtn = document.createElement('button');
                removeBtn.className = 'inv-remove';
                removeBtn.textContent = '\xD7';
                removeBtn.title = 'Remove item';
                removeBtn.onclick = () => removeItem(key);
                row.appendChild(removeBtn);

                body.appendChild(row);
            });

            list.appendChild(section);
        });

        if (!anyRendered) {
            list.innerHTML = '<div class="inv-empty">\u2694 Your pack is empty \u2694</div>';
        }
    }

    function adjustAmount(itemKey, itemName, currentAmount, delta) {
        const existing = Object.entries(pendingRequests).find(([, r]) => r.itemKey === itemKey);
        if (existing) {
            const [reqKey, req] = existing;
            const newDelta = req.delta + delta;
            if (newDelta === 0) {
                db.ref('inventoryRequests/' + charKey + '/' + reqKey).remove();
            } else {
                db.ref('inventoryRequests/' + charKey + '/' + reqKey + '/delta').set(newDelta);
            }
        } else {
            db.ref('inventoryRequests/' + charKey).push({
                charKey, charName: char.name, itemKey, itemName,
                currentAmount, delta, timestamp: Date.now(),
            });
        }
    }

    function removeItem(key) {
        db.ref('characters/' + charKey + '/inventory/' + key).remove();
        Object.entries(pendingRequests).forEach(([reqKey, req]) => {
            if (req.itemKey === key) db.ref('inventoryRequests/' + charKey + '/' + reqKey).remove();
        });
    }

    function addItem() {
        const input = document.getElementById('invInput');
        const amtInput = document.getElementById('invAmtInput');
        const catSelect = document.getElementById('invCatSelect');
        const name = input.value.trim();
        if (!name) return;
        const amount = Math.max(1, parseInt(amtInput.value) || 1);
        const category = catSelect.value;
        if (category === 'weapons' || category === 'armour') {
            showItemStatsModal(name, amount, category);
        } else {
            db.ref('characters/' + charKey + '/inventory').push({ name, amount, category });
            input.value = '';
            amtInput.value = '1';
            input.focus();
        }
    }

    function showItemStatsModal(name, amount, category) {
        const modal = document.getElementById('item-stats-modal');
        document.getElementById('itemStatsTitle').textContent = '\u2726 ' + name;
        const fields = document.getElementById('itemStatsFields');
        fields.innerHTML = '';

        if (category === 'weapons') {
            // Damage row: [count] [die] [type]
            const dmgRow = document.createElement('div');
            dmgRow.className = 'item-stats-field-row';
            const dmgLbl = document.createElement('span');
            dmgLbl.className = 'item-stats-field-label';
            dmgLbl.textContent = 'Damage';
            const countIn = document.createElement('input');
            countIn.type = 'number';
            countIn.className = 'item-stats-num';
            countIn.id = 'isDiceCount';
            countIn.value = '1'; countIn.min = '1'; countIn.max = '20';
            const dieSelect = document.createElement('select');
            dieSelect.className = 'item-stats-sel';
            dieSelect.id = 'isDieType';
            ['d4','d6','d8','d10','d12','d20'].forEach(d => {
                const o = document.createElement('option');
                o.value = o.textContent = d;
                if (d === 'd6') o.selected = true;
                dieSelect.appendChild(o);
            });
            dmgRow.appendChild(dmgLbl); dmgRow.appendChild(countIn); dmgRow.appendChild(dieSelect);
            fields.appendChild(dmgRow);

            const typeRow = document.createElement('div');
            typeRow.className = 'item-stats-field-row';
            const typeLbl = document.createElement('span');
            typeLbl.className = 'item-stats-field-label';
            typeLbl.textContent = 'Type';
            const typeSelect = document.createElement('select');
            typeSelect.className = 'item-stats-sel';
            typeSelect.id = 'isDmgType';
            ['slashing','piercing','bludgeoning','fire','cold','lightning','acid','poison','necrotic','radiant','psychic','thunder','force'].forEach(t => {
                const o = document.createElement('option');
                o.value = o.textContent = t;
                typeSelect.appendChild(o);
            });
            typeRow.appendChild(typeLbl); typeRow.appendChild(typeSelect);
            fields.appendChild(typeRow);
        } else {
            const acRow = document.createElement('div');
            acRow.className = 'item-stats-field-row';
            const acLbl = document.createElement('span');
            acLbl.className = 'item-stats-field-label';
            acLbl.textContent = 'AC';
            const acIn = document.createElement('input');
            acIn.type = 'number';
            acIn.className = 'item-stats-num';
            acIn.id = 'isAC';
            acIn.value = '10'; acIn.min = '1'; acIn.max = '30';
            acRow.appendChild(acLbl); acRow.appendChild(acIn);
            fields.appendChild(acRow);
        }

        const notesLbl = document.createElement('div');
        notesLbl.className = 'item-stats-notes-label';
        notesLbl.textContent = 'Other info';
        const notesArea = document.createElement('textarea');
        notesArea.className = 'item-stats-notes';
        notesArea.id = 'isNotes';
        notesArea.placeholder = category === 'weapons'
            ? 'Range, finesse, thrown, two-handed...'
            : 'Stealth disadvantage, STR requirement...';
        fields.appendChild(notesLbl);
        fields.appendChild(notesArea);

        document.getElementById('itemStatsConfirmBtn').onclick = () => {
            const itemData = { name, amount, category };
            if (category === 'weapons') {
                const count = document.getElementById('isDiceCount').value || '1';
                const die = document.getElementById('isDieType').value;
                itemData.damageDice = count + die;
                itemData.damageType = document.getElementById('isDmgType').value;
            } else {
                itemData.ac = parseInt(document.getElementById('isAC').value) || 10;
            }
            const notes = document.getElementById('isNotes').value.trim();
            if (notes) itemData.notes = notes;
            db.ref('characters/' + charKey + '/inventory').push(itemData);
            document.getElementById('invInput').value = '';
            document.getElementById('invAmtInput').value = '1';
            hideItemStatsModal();
            document.getElementById('invInput').focus();
        };

        modal.classList.add('open');
    }

    function hideItemStatsModal() {
        document.getElementById('item-stats-modal').classList.remove('open');
    }

    document.getElementById('invInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addItem();
    });

    // =========================================================
    // ROLL HISTORY
    // =========================================================
    function renderRollHistory() {
        const container = document.getElementById('rollHistory');
        container.innerHTML = '';
        if (rollHistory.length === 0) return;

        const section = document.createElement('div');
        section.className = 'roll-history-section';

        const header = document.createElement('div');
        header.className = 'roll-history-header';
        header.innerHTML =
            '<span>\u2726 History</span>' +
            '<button class="roll-history-clear" onclick="clearRollHistory()">clear</button>';
        section.appendChild(header);

        rollHistory.forEach(entry => {
            const row = document.createElement('div');
            row.className = 'roll-history-row';
            const valCls = entry.isTotalCrit ? ' crit' : entry.isTotalFail ? ' fail' : '';
            row.innerHTML =
                '<span><span class="roll-history-type">' + (entry.type || '') + '</span>' + entry.label + '</span>' +
                '<span class="roll-history-val' + valCls + '">' + entry.total + entry.suffix + '</span>';
            section.appendChild(row);
        });

        container.appendChild(section);
    }

    function clearRollHistory() {
        rollHistory = [];
        renderRollHistory();
    }

    // =========================================================
    // HELPERS
    // =========================================================
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str == null ? '' : String(str);
        return div.innerHTML;
    }

    function fmtMod(mod) {
        return mod >= 0 ? '+' + mod : String(mod);
    }

    // =========================================================
    // START
    // =========================================================
    init();
</script>
<div id="ability-popup"><div class="popup-name"></div><div class="popup-desc"></div></div>
<div id="item-stats-modal">
    <div class="item-stats-box">
        <div class="item-stats-title" id="itemStatsTitle"></div>
        <div id="itemStatsFields"></div>
        <div class="item-stats-btns">
            <button class="item-stats-cancel-btn" onclick="hideItemStatsModal()">Cancel</button>
            <button class="item-stats-confirm-btn" id="itemStatsConfirmBtn">Add</button>
        </div>
    </div>
</div>
</body>
</html>
