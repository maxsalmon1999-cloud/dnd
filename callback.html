<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connecting to Spotify…</title>
    <style>
        body {
            background: #0c0a08;
            color: #c4a44e;
            font-family: 'Geneva', 'Monaco', 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .msg {
            text-align: center;
            font-size: 14px;
            border: 2px solid #3a3530;
            padding: 24px 32px;
            background: #1a1815;
        }
        .err { color: #e04040; margin-top: 8px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="msg" id="status">Connecting to Spotify…</div>
    <script>
        (async () => {
            const CLIENT_ID = '0ea5b2463294464f882a3b3c9798352e';
            const REDIRECT_URI = 'http://127.0.0.1:5500/callback.html';
            const status = document.getElementById('status');

            const code = new URLSearchParams(window.location.search).get('code');
            const error = new URLSearchParams(window.location.search).get('error');
            const verifier = localStorage.getItem('spotify_code_verifier');

            if (error) {
                status.innerHTML = 'Spotify authorisation denied.<div class="err">' + error + '</div>';
                return;
            }

            if (!code || !verifier) {
                status.innerHTML = 'Missing auth code or verifier.<div class="err">Try connecting again from the app.</div>';
                return;
            }

            try {
                const res = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: verifier,
                    }),
                });

                const data = await res.json();

                if (data.access_token) {
                    localStorage.setItem('spotify_access_token', data.access_token);
                    localStorage.setItem('spotify_refresh_token', data.refresh_token || '');
                    localStorage.setItem('spotify_token_expiry', String(Date.now() + data.expires_in * 1000));
                    localStorage.removeItem('spotify_code_verifier');
                    status.textContent = 'Connected! Redirecting…';
                    window.location.href = '/';
                } else {
                    status.innerHTML = 'Token exchange failed.<div class="err">' + (data.error_description || JSON.stringify(data)) + '</div>';
                }
            } catch (err) {
                status.innerHTML = 'Network error.<div class="err">' + err.message + '</div>';
            }
        })();
    </script>
</body>
</html>
